<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agroain · स्मार्ट फसल सलाह</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
        <div class="loader-text">🌾 Agroain लोड हो रहा है...</div>
        <div class="loader-subtext">कृपया थोड़ा प्रतीक्षा करें</div>
    </div>

    <div class="container" id="mainContainer">
        <div class="header">
            <h1>Agroain</h1>
            <div class="crop-selector">
                <select id="cropSelect">
                    <option value="soyabean">सोयाबीन</option>
                    <option value="maize">मक्का</option>
                    <option value="wheat">गेहूं</option>
                    <option value="garlic">लहसुन</option>
                    <option value="onion">प्याज</option>
                    <option value="potato">आलू</option>
                    <option value="paddy">धान (चावल)</option>
                    <option value="sugarcane">गन्ना</option>
                    <option value="cotton">कपास</option>
                    <option value="groundnut">मूंगफली</option>
                    <option value="mustard">सरसों</option>
                    <option value="chickpea">चना</option>
                    <option value="pea">मटर</option>
                    <option value="lentil">मसूर (दाल)</option>
                    <option value="barley">जौ</option>
                    <option value="sorghum">ज्वार</option>
                    <option value="millet">बाजरा</option>
                    <option value="sesame">तिल</option>
                    <option value="sunflower">सूरजमुखी</option>
                    <option value="pigeonpea">अरहर (तुअर)</option>
                </select>
            </div>
            <div class="subtitle">स्मार्ट सुरक्षा · पैकेज और दवाइयाँ</div>
        </div>

        <div class="section">
            <label>🧾 आपकी जमीन कितने बीघा है?</label>
            <select id="bigha" onchange="checkBighaOption()">
                <option value="1">1 बीघा</option>
                <option value="2">2 बीघा</option>
                <option value="5">5 बीघा</option>
                <option value="10">10 बीघा</option>
                <option value="20">20 बीघा</option>
                <option value="50">50 बीघा</option>
                <option value="other">अन्य (लिखें)</option>
            </select>

            <!-- Custom Bigha Input (Default hidden) -->
            <input type="number" id="customBigha" placeholder="कितने बीघा है?" style="display:none; margin-top: 10px;">

            <label style="margin-top: 15px;">📅 फसल कितने दिन की है? <span class="label-hint">(या दवाई / तकनीकी / कंपनी का नाम लिखें)</span></label>
            <input type="text" id="searchInput" placeholder="जैसे: 25, इमिडाक्लोप्रिड, सिंजेंटा, Bayer ..." autocomplete="off">

            <button onclick="handleSmartSearch()">🔍 दवाई और पैकेज देखें</button>
        </div>

        <div id="result">
            <h3 id="resTitle">🔍 परिणाम</h3>
            <div id="grandTotalContainer"></div>
        </div>
    </div>
    
    <div id="imageModal" class="image-modal" onclick="closeZoom()">
        <span class="modal-close">&times;</span>
        <img id="modalImg" src="" alt="Zoomed Product">
    </div>

    <script src="js/script.js"></script>
    <script>
        function checkBighaOption() {
            const bighaSelect = document.getElementById('bigha');
            const customBigha = document.getElementById('customBigha');
            if (bighaSelect.value === 'other') {
                customBigha.style.display = 'block';
            } else {
                customBigha.style.display = 'none';
            }
        }
    </script>
</body>
</html>
