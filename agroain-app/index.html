    <meta property="og:title" content="Agroain - स्मार्ट फसल सुरक्षा सलाह | दवा और पैकेज">
    <meta property="og:description" content="फसल के दिन और बीघा के अनुसार पाएं सटीक कीटनाशक व पैकेज। 20+ फसलों के लिए।">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://agroain.in/">
    <!-- अस्थायी इमेज: बाद में अपनी खुद की इमेज का URL डालें -->

    <meta property="og:site_name" content="Agroain">
    <meta property="og:locale" content="hi_IN">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Agroain - स्मार्ट फसल सुरक्षा सलाह">

    <meta name="twitter:image" content="https://via.placeholder.com/1200x630/4CAF50/white?text=Agroain+Smart+Fasal+Salah">

    <!-- Favicon (अपनी favicon.ico फ़ाइल root में रखें) -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Firebase Scripts (पुराने जैसे ही) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Font Awesome & Custom CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
        <div class="loader-text">🌾 Agroain लोड हो रहा है...</div>
        <div class="loader-subtext">कृपया थोड़ा प्रतीक्षा करें</div>
    </div>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>Agroain</h1>
            <div class="crop-selector">
                <select id="cropSelect">
                    <option value="soyabean">सोयाबीन</option>
                    <option value="maize">मक्का</option>
                    <option value="wheat">गेहूं</option>
                    <option value="garlic">लहसुन</option>
                    <option value="onion">प्याज</option>
                    <option value="potato">आलू</option>
                    <option value="paddy">धान (चावल)</option>
                    <option value="sugarcane">गन्ना</option>
                    <option value="cotton">कपास</option>
                    <option value="groundnut">मूंगफली</option>
                    <option value="mustard">सरसों</option>
                    <option value="chickpea">चना</option>
                    <option value="pea">मटर</option>
                    <option value="lentil">मसूर (दाल)</option>
                    <option value="barley">जौ</option>
                    <option value="sorghum">ज्वार</option>
                    <option value="millet">बाजरा</option>
                    <option value="sesame">तिल</option>
                    <option value="sunflower">सूरजमुखी</option>
                    <option value="pigeonpea">अरहर (तुअर)</option>
                </select>
            </div>
            <div class="subtitle">स्मार्ट सुरक्षा · पैकेज और दवाइयाँ</div>
        </div>

        <div class="section">
            <label>🧾 आपकी जमीन कितने बीघा है?</label>
            <select id="bigha" onchange="checkBighaOption()">
                <option value="1">1 बीघा</option>
                <option value="2">2 बीघा</option>
                <option value="5">5 बीघा</option>
                <option value="10">10 बीघा</option>
                <option value="20">20 बीघा</option>
                <option value="50">50 बीघा</option>
                <option value="other">अन्य (लिखें)</option>
            </select>

            <!-- Custom Bigha Input -->
            <input type="number" id="customBigha" placeholder="कितने बीघा है?" style="display:none; margin-top: 10px;">

            <label style="margin-top: 15px;">📅 फसल कितने दिन की है? <span class="label-hint">(या दवाई / तकनीकी / कंपनी का नाम लिखें)</span></label>
            <input type="text" id="searchInput" placeholder="जैसे: 25, इमिडाक्लोप्रिड, सिंजेंटा, Bayer ..." autocomplete="off">

            <button onclick="handleSmartSearch()">🔍 दवाई और पैकेज देखें</button>
        </div>

        <div id="result">
            <h3 id="resTitle">🔍 परिणाम</h3>
            <div id="grandTotalContainer"></div>
        </div>
    </div>

    <!-- Image Zoom Modal -->
    <div id="imageModal" class="image-modal" onclick="closeZoom()">
        <span class="modal-close">&times;</span>
        <img id="modalImg" src="" alt="Zoomed Product">
    </div>

    <!-- मुख्य जावास्क्रिप्ट फ़ाइल (आपकी मौजूदा) -->
    <script src="js/script.js"></script>

    <!-- बीघा विकल्प चेक करने की उपयोगिता -->
    <script>
        function checkBighaOption() {
            const bighaSelect = document.getElementById('bigha');
            const customBigha = document.getElementById('customBigha');
            if (bighaSelect.value === 'other') {
                customBigha.style.display = 'block';
            } else {
                customBigha.style.display = 'none';
            }
        }
    </script>

    <!-- Structured Data (JSON-LD) for Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Agroain",
      "alternateName": ["Agroain स्मार्ट फसल सलाह", "किसान दवा पैकेज"],
      "url": "https://agroain.in/",
      "description": "फसल के दिन और बीघा के अनुसार सटीक कीटनाशक, खरपतवारनाशी और सुरक्षा पैकेज की जानकारी देने वाला मंच।",
      "inLanguage": "hi",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://agroain.in/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- Agroain Checkout Popup -->
<div id="checkoutModal" class="checkout-modal">
  <div class="checkout-box">
    <h2>🌾 Agroain Checkout</h2>

<div class="checkout-product-info">
    <h3 id="checkoutProductName"></h3>
    <p>कुल राशि: <strong id="checkoutAmount"></strong></p>
</div>

    <input type="text" id="custName" placeholder="पूरा नाम">

    <input type="tel" id="custPhone" placeholder="मोबाइल नंबर">

    <textarea id="custAddress" placeholder="पूरा पता"></textarea>

    <input type="number" id="custPincode" placeholder="पिन कोड">

    <div class="checkout-buttons">
      <button onclick="startPayment()">भुगतान करें</button>
      <button onclick="closeCheckout()">बंद करें</button>
    </div>
  </div>
</div>
</body>
</html>
