<div class="card">
    <div class="card-header">
        <div class="card-title">Add New Customer</div>
    </div>
    <form id="customerForm">
        <div class="form-row">
            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" id="customerName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="customerPhone">Phone Number</label>
                <input type="tel" id="customerPhone" class="form-control" required>
            </div>
        </div>
        <div class="form-group">
            <label for="customerAddress">Address</label>
            <textarea id="customerAddress" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Add Customer</button>
    </form>
</div>

<div class="card">
    <div class="card-header">
        <div class="card-title">Customer List</div>
    </div>
    <div class="alert alert-success" id="customerAlert"></div>
    <table id="customerTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Credit Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="customerList">
        </tbody>
    </table>
</div>

<script>
    // --- CUSTOMERS MODULE SCRIPT ---
    const customerList = document.getElementById('customerList');
    const customerForm = document.getElementById('customerForm');
    
    window.customersModule = {
        addCustomer: function(e) {
            if (e) e.preventDefault();
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const address = document.getElementById('customerAddress').value;

            const customer = {
                id: window.generateId(), name, phone, address, creditAmount: 0,
                createdAt: new Date().toISOString()
            };

            window.customers.push(customer);
            window.saveData();
            window.customersModule.renderCustomers();
            window.updateStats();
            
            window.showAlert('customerAlert', 'Customer added successfully!', 'success');
            
            customerForm.reset();
        },
        
        updateCustomer: function() {
            const id = document.getElementById('editCustomerId').value;
            const name = document.getElementById('editCustomerName').value;
            const phone = document.getElementById('editCustomerPhone').value;
            const address = document.getElementById('editCustomerAddress').value;

            const customerIndex = window.customers.findIndex(c => c.id === id);
            if (customerIndex !== -1) {
                window.customers[customerIndex].name = name;
                window.customers[customerIndex].phone = phone;
                window.customers[customerIndex].address = address;

                window.saveData();
                window.customersModule.renderCustomers();
                window.updateStats();
                
                window.showAlert('customerAlert', 'Customer updated successfully!', 'success');
                
                document.getElementById('editCustomerModal').style.display = 'none';
            }
        },
        
        deleteCustomer: function(id) {
            const customer = window.customers.find(c => c.id === id);
            
            if (customer.creditAmount > 0) {
                alert('Cannot delete customer with outstanding credit! Settle the credit first.');
                return;
            }
            
            if (confirm('Are you sure you want to delete this customer?')) {
                window.customers = window.customers.filter(c => c.id !== id);
                window.saveData();
                window.customersModule.renderCustomers();
                window.updateStats();
                
                window.showAlert('customerAlert', 'Customer deleted successfully!', 'success');
            }
        },
        
        editCustomer: function(id) {
            const customer = window.customers.find(c => c.id === id);
            if (customer) {
                document.getElementById('editCustomerId').value = customer.id;
                document.getElementById('editCustomerName').value = customer.name;
                document.getElementById('editCustomerPhone').value = customer.phone;
                document.getElementById('editCustomerAddress').value = customer.address;
                
                document.getElementById('editCustomerModal').style.display = 'flex';
            }
        },

        renderCustomers: function() {
            window.customersModule.renderFilteredCustomers(window.customers);
        },
        
        renderFilteredCustomers: function(filteredCustomers) {
            customerList.innerHTML = '';
            
            if (filteredCustomers.length === 0) {
                customerList.innerHTML = '<tr><td colspan="6" style="text-align: center;">No customers found</td></tr>';
                return;
            }
            
            filteredCustomers.forEach(customer => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${customer.id.substring(0, 8)}</td>
                    <td>${customer.name}</td>
                    <td>${customer.phone}</td>
                    <td>${customer.address || 'N/A'}</td>
                    <td>₹${customer.creditAmount.toFixed(2)}</td>
                    <td class="action-buttons">
                        <button class="action-btn btn-primary" onclick="window.editCustomer('${customer.id}')">Edit</button>
                        <button class="action-btn btn-danger" onclick="window.deleteCustomer('${customer.id}')">Delete</button>
                    </td>
                `;
                customerList.appendChild(row);
            });
        }
    };
    
    // Initialization/Listeners
    document.addEventListener('DOMContentLoaded', function() {
        window.customersModule.renderCustomers();
        customerForm.addEventListener('submit', window.customersModule.addCustomer);
    });
    
    // Expose render function for global search
    window.renderFilteredCustomers = window.customersModule.renderFilteredCustomers;
</script>
