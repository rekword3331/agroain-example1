<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 एग्रोएन - स्मार्ट कस्टमाइज्ड पैकेज</title>
    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --bg-light: #f0f4f0;
            --white: #ffffff;
            --danger: #d32f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-light);
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #c8e6c9;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.5rem;
        }

        /* पेजिनेशन पैकेज बटन (विकल्प 1, विकल्प 2) */
        .package-pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .pkg-btn {
            background: white;
            color: var(--primary);
            border: 2px solid var(--secondary);
            padding: 12px 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .pkg-btn.active {
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 12px rgba(46,125,50,0.3);
        }

        .summary-title {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 12px;
        }

        /* दवाइयों के कार्ड्स की लिस्ट */
        .cart-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            position: relative;
            transition: 0.2s;
        }

        .cart-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-color: var(--secondary);
        }

        .prod-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #e8f5e9;
            background: #f9f9f9;
        }

        .prod-info {
            flex: 1;
            margin-left: 15px;
        }

        .prod-info h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 5px;
        }

        .tech-tag {
            font-size: 0.8rem;
            color: var(--primary);
            background: #e8f5e9;
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .dose-tag {
            font-size: 0.85rem;
            color: #666;
            display: block;
        }

        .prod-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--danger);
            margin-top: 5px;
        }

        /* डिलीट/हटाएं बटन */
        .remove-btn {
            background: #ffebee;
            color: var(--danger);
            border: 1px solid #ffcdd2;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .remove-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* टोटल और बाय बटन फुटर */
        .cart-footer {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .total-price {
            color: var(--danger);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .buy-btn {
            background: #ff9800;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #e68900;
            transition: 0.2s;
            text-align: center;
        }

        .buy-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .empty-msg {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌾 एग्रोएन स्मार्ट पैकेज (25 दिन)</h1>
    </header>

    <div class="package-pagination" id="pkgPaginationControls"></div>

    <div class="summary-title" id="pkgSummary"></div>

    <div class="cart-list" id="cartList"></div>

    <div class="cart-footer">
        <div class="total-row">
            <span>कुल राशि (Total):</span>
            <span class="total-price" id="totalPrice">₹ 0</span>
        </div>
        <button class="buy-btn" onclick="buyNow()">🛒 अभी खरीदें (Buy Now)</button>
    </div>
</div>

<script>
    // --- 1. यह आपका डेटाबेस है (फोटो लिंक्स के साथ) ---
    const databasePackages = [
        {
            packageNo: 1,
            packageName: "विकल्प 1: स्टैंडर्ड सुरक्षा (7 दवाइयां)",
            medicines: [
                { id: 101, name: "इल्ली नाशक", tech: "Emamectin Benzoate", dose: "100 ग्राम", price: 350, img: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?auto=format&fit=crop&w=150&q=80" },
                { id: 102, name: "फंगीसाइड", tech: "Tebuconazole + Sulphur", dose: "500 ग्राम", price: 450, img: "https://images.unsplash.com/photo-1581578731522-a204fe27f390?auto=format&fit=crop&w=150&q=80" },
                { id: 103, name: "एनपीके खाद", tech: "NPK 19:19:19", dose: "1 किलो", price: 150, img: "https://images.unsplash.com/photo-1599599811213-902996c97a82?auto=format&fit=crop&w=150&q=80" },
                { id: 104, name: "अमीनो टॉनिक", tech: "Amino Acid Blend", dose: "250 मिली", price: 300, img: "https://images.unsplash.com/photo-1628155501594-571fc5979bc7?auto=format&fit=crop&w=150&q=80" },
                { id: 105, name: "सिलिकॉन चिपको", tech: "Silicon Spreader", dose: "50 मिली", price: 100, img: "https://images.unsplash.com/photo-1607619056574-7b8d3ee536b2?auto=format&fit=crop&w=150&q=80" },
                { id: 106, name: "सफेद मक्खी नाशक", tech: "Acetamiprid", dose: "100 ग्राम", price: 200, img: "https://images.unsplash.com/photo-1563214821-2e1a38340d89?auto=format&fit=crop&w=150&q=80" },
                { id: 107, name: "ह्यूमिक एसिड", tech: "Humic Acid Liquid", dose: "250 मिली", price: 250, img: "https://images.unsplash.com/photo-1584263347416-85a696b4eda7?auto=format&fit=crop&w=150&q=80" }
            ]
        },
        {
            packageNo: 2,
            packageName: "विकल्प 2: प्रीमियम सुरक्षा (5 दवाइयां)",
            medicines: [
                { id: 201, name: "हैवी इल्ली मार", tech: "Chlorantraniliprole 18.5%", dose: "60 मिली", price: 900, img: "https://images.unsplash.com/photo-1587560699334-bea9339fc3f9?auto=format&fit=crop&w=150&q=80" },
                { id: 202, name: "हैवी फंगीसाइड", tech: "Azoxystrobin + Difenoconazole", dose: "200 मिली", price: 800, img: "https://images.unsplash.com/photo-1615485500704-8e990f3900f7?auto=format&fit=crop&w=150&q=80" },
                { id: 203, name: "ग्रोथ रेगुलेटर", tech: "Chlormequat Chloride", dose: "250 मिली", price: 350, img: "https://images.unsplash.com/photo-1584263347416-85a696b4eda7?auto=format&fit=crop&w=150&q=80" },
                { id: 204, name: "सीवीड टॉनिक", tech: "Seaweed Extract", dose: "500 मिली", price: 400, img: "https://images.unsplash.com/photo-1532187875605-7fe358871cd2?auto=format&fit=crop&w=150&q=80" },
                { id: 205, name: "सुपर स्प्रेडर", tech: "Super Spreader", dose: "50 मिली", price: 150, img: "https://images.unsplash.com/photo-1607619056574-7b8d3ee536b2?auto=format&fit=crop&w=150&q=80" }
            ]
        }
    ];

    let activePackageIndex = 0; // Current selection
    let activeMedicines = []; // Dynamic list jo customer modify karega

    // --- 2. Initialize Page ---
    window.onload = function() {
        renderPaginationButtons();
        loadPackage(0); // Load 1st package by default
    };

    // --- 3. Pagination buttons (1, 2) render karna ---
    function renderPaginationButtons() {
        const controls = document.getElementById('pkgPaginationControls');
        controls.innerHTML = '';

        databasePackages.forEach((pkg, index) => {
            const btn = document.createElement('button');
            btn.className = `pkg-btn ${index === activePackageIndex ? 'active' : ''}`;
            btn.id = `btn-${index}`;
            btn.innerText = `${pkg.packageNo}`; // Sirf Number 1 2 3 dikhane ke liye
            btn.onclick = () => {
                loadPackage(index);
            };
            controls.appendChild(btn);
        });
    }

    // --- 4. Package load karna ---
    function loadPackage(index) {
        activePackageIndex = index;
        
        // Active button change karein
        document.querySelectorAll('.pkg-btn').forEach((btn, i) => {
            if(i === index) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        const currentPkg = databasePackages[index];
        document.getElementById('pkgSummary').innerText = `📋 ${currentPkg.packageName}`;

        // Deep copy of medicines array to allow deletions without breaking original data
        activeMedicines = JSON.parse(JSON.stringify(currentPkg.medicines));

        renderCartItems();
    }

    // --- 5. Cart Items render karna (Photo + Remove Button) ---
    function renderCartItems() {
        const listContainer = document.getElementById('cartList');
        listContainer.innerHTML = '';

        if (activeMedicines.length === 0) {
            listContainer.innerHTML = `<div class="empty-msg">⚠️ इस पैकेज में कोई दवा नहीं बची है!</div>`;
            updateTotal(0);
            return;
        }

        let runningTotal = 0;

        activeMedicines.forEach((med) => {
            runningTotal += med.price;

            listContainer.innerHTML += `
                <div class="cart-item">
                    <img src="${med.img}" class="prod-img" alt="${med.name}" onerror="this.src='https://via.placeholder.com/150?text=Agroain'">
                    <div class="prod-info">
                        <h3>${med.name}</h3>
                        <span class="tech-tag">${med.tech}</span>
                        <span class="dose-tag">📏 डोज़: ${med.dose}</span>
                        <div class="prod-price">₹ ${med.price}</div>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${med.id})">❌ हटाएं</button>
                </div>
            `;
        });

        updateTotal(runningTotal);
    }

    // --- 6. Kisi dawai ko remove karna ---
    function removeItem(id) {
        activeMedicines = activeMedicines.filter(med => med.id !== id);
        renderCartItems(); // Dubara list refresh karein
    }

    // --- 7. Total update karna ---
    function updateTotal(amount) {
        document.getElementById('totalPrice').innerText = `₹ ${amount}`;
    }

    // --- 8. Buy Now Action ---
    function buyNow() {
        if(activeMedicines.length === 0) {
            alert("⚠️ कृपया कोई दवा चुनें!");
            return;
        }
        alert("✅ बधाई! आर्डर करने के लिए धन्यवाद। स्क्रिप्ट का काम हम बाद में करेंगे।");
    }
</script>

</body>
</html>
