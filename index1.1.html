<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agroain · स्मार्ट फसल सलाह</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #8bc34a; --dark: #1b5e20; --light: #f1f8e9; --accent: #ff9800; --danger: #d32f2f; --info: #0288d1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f4; margin: 0; padding: 10px; }
        
        .page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 2000; transition: 0.5s; }
        .page-loader.hidden { opacity: 0; visibility: hidden; }
        .page-spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .header h1 { margin: 0; color: var(--dark); font-size: 1.8rem; }
        .header .crop-selector { min-width: 160px; }
        .header select { padding: 8px 12px; border-radius: 30px; border: 2px solid var(--primary); background-color: var(--light); font-weight: bold; color: var(--dark); font-size: 1rem; cursor: pointer; width: 100%; }
        .subtitle { text-align: center; color: #555; margin-top: 5px; font-size: 0.9rem; width: 100%; }
        
        .section { border: 1px solid #ddd; padding: 15px; border-radius: 12px; background: #fafafa; margin-bottom: 15px; }
        input, button, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; width: 100%; box-sizing: border-box; background: white; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background: var(--dark); }
        
        .radio-group { display: flex; gap: 20px; margin: 15px 0; align-items: center; }
        .radio-group label { display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .radio-group input[type="radio"] { width: auto; margin-right: 5px; accent-color: var(--primary); }

        .hidden { display: none; }
        .option-buttons { display: flex; gap: 10px; margin: 10px 0; }
        .option-btn { background: #e8f5e9; color: #1b5e20; border: 2px solid #c8e6c9; padding: 10px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; flex: 1; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--dark); }

        #result { display: none; margin-top: 20px; }
        .success-box { background: var(--light); padding: 15px; border-radius: 10px; border: 1px solid var(--secondary); margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .alert-info { background: #e3f2fd; border-left: 5px solid var(--info); padding: 10px; color: var(--info); font-weight: bold; margin-top: 10px; border-radius: 5px; }
        .med-card { background: #fff; border: 1px solid #c8e6c9; border-radius: 10px; padding: 12px; margin-top: 10px; transition: 0.2s; }
        .med-card strong { color: var(--primary); }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .page-btn { background: #e0e0e0; color: #333; border: none; padding: 8px 12px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .page-btn.active { background: var(--primary); color: white; }
        .dose-badge { background: var(--light); border-radius: 20px; padding: 4px 10px; font-size: 0.8rem; display: inline-block; margin: 4px 4px 0 0; }
    </style>
</head>
<body>

    <div class="page-loader" id="pageLoader"><div class="page-spinner"></div></div>

    <div class="container">
        <div class="header">
            <h1>Agroain</h1>
            <div class="crop-selector">
                <select id="cropSelect">
                    <option value="सोयाबीन">सोयाबीन</option>
                    <option value="मक्का">मक्का</option>
                    <option value="गेहूं">गेहूं</option>
                    <option value="लहसुन">लहसुन</option>
                    <option value="प्याज">प्याज</option>
                    <option value="आलू">आलू</option>
                    <option value="धान">धान (चावल)</option>
                    <option value="गन्ना">गन्ना</option>
                    <option value="कपास">कपास</option>
                    <option value="मूंगफली">मूंगफली</option>
                    <option value="सरसों">सरसों</option>
                    <option value="चना">चना</option>
                    <option value="मटर">मटर</option>
                    <option value="मसूर">मसूर (दाल)</option>
                    <option value="जौ">जौ</option>
                    <option value="ज्वार">ज्वार</option>
                    <option value="बाजरा">बाजरा</option>
                    <option value="तिल">तिल</option>
                    <option value="सूरजमुखी">सूरजमुखी</option>
                    <option value="अरहर">अरहर (तुअर)</option>
                </select>
            </div>
            <div class="subtitle">स्मार्ट सुरक्षा · डेटाबेस संचालित</div>
        </div>

        <div class="section">
            <label>🧾 आपकी जमीन कितने बीघा है?</label>
            <select id="bigha">
                <option value="1">1 बीघा</option>
                <option value="2">2 बीघा</option>
                <option value="3">3 बीघा</option>
                <option value="4">4 बीघा</option>
                <option value="5">5 बीघा</option>
                <option value="6">6 बीघा</option>
                <option value="8">8 बीघा</option>
                <option value="10">10 बीघा</option>
                <option value="12">12 बीघा</option>
                <option value="15">15 बीघा</option>
                <option value="20">20 बीघा</option>
                <option value="25">25 बीघा</option>
                <option value="30">30 बीघा</option>
                <option value="50">50 बीघा</option>
            </select>

            <label>🌱 क्या आपने अपनी फसल की बुवाई कर दी है?</label>
            <div class="radio-group">
                <label><input type="radio" name="buwai" value="yes" checked onchange="toggleBuwaiOptions()"> हाँ</label>
                <label><input type="radio" name="buwai" value="no" onchange="toggleBuwaiOptions()"> नहीं</label>
            </div>

            <!-- जब हाँ चुना हो -->
            <div id="yesContainer">
                <label>📅 फसल कितने दिन की है? <span style="font-weight:normal;">(या दवाई / तकनीकी नाम लिखें)</span></label>
                <input type="text" id="searchInput" placeholder="जैसे: 25, इमिडाक्लोप्रिड, Syno ...">
            </div>

            <!-- जब नहीं चुना हो -->
            <div id="noContainer" class="hidden">
                <label>🧴 कृपया चुनें:</label>
                <div class="option-buttons">
                    <div id="seedTreatmentBtn" class="option-btn selected" onclick="selectPreOption('seed')">🌾 बीज उपचार</div>
                    <div id="preSowingBtn" class="option-btn" onclick="selectPreOption('presowing')">🧪 बुवाई से पहले की दवाई (खेत)</div>
                </div>
                <input type="hidden" id="selectedPreOption" value="seed">
            </div>

            <button onclick="handleSmartSearch()">🔍 दवाई और स्टेज देखें</button>
        </div>

        <div id="result">
            <h3 id="resTitle">🔍 परिणाम</h3>
            <div id="resContent"></div>
            <div id="paginationControls" class="pagination"></div>
        </div>
    </div>

    <script>
        // ------------------- Firebase Config -------------------
        const firebaseConfig = {
            databaseURL: "https://agroain-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Global variables
        let allProducts = [];        // सभी दवाइयाँ (inventory से)
        let filteredProducts = [];   // फिल्टर के बाद की लिस्ट
        let currentPage = 1;
        const itemsPerPage = 5;

        // ------------------- पेज लोड -------------------
        window.onload = async () => {
            await loadInventory();      // पहले सारी दवाइयाँ लोड करें
            setTimeout(() => document.getElementById('pageLoader').classList.add('hidden'), 800);
            toggleBuwaiOptions();
        };

        // इन्वेंटरी लोड करें (सिर्फ दवाई श्रेणी वाली)
        async function loadInventory() {
            try {
                const snapshot = await db.ref('inventory').once('value');
                const data = snapshot.val();
                if (!data) return;
                allProducts = [];
                for (let key in data) {
                    let p = data[key];
                    if (p.cat === 'dawai') {   // केवल दवाई वाले उत्पाद
                        p.id = key;
                        allProducts.push(p);
                    }
                }
                console.log(`✅ इन्वेंटरी लोड: ${allProducts.length} दवाइयाँ`);
            } catch (err) {
                console.error("इन्वेंटरी लोड में त्रुटि:", err);
            }
        }

        // बीघा के हिसाब से डोज़ कैलकुलेशन (स्पेशल लॉजिक के साथ)
        function calculateDoseByArea(product, bigha) {
            // अगर स्पेशल लॉजिक हो तो उसे पार्स कर सकते हैं (सरल उदाहरण)
            let doseText = "";
            if (product.specialLogic && product.specialLogic.includes("Imeza")) {
                // मान लिया कि 1 लीटर Imeza = 5 बीघा => प्रति बीघा 200ml
                let imezaMl = bigha * 200;
                doseText = `Imeza: ${imezaMl} ml, Syno: ${imezaMl} ml (${bigha} बीघा के लिए)`;
            } else if (product.doseSpray && product.doseSpray !== "—") {
                // स्प्रे डोज़ को बीघा से गुणा करें (मान लिया डोज़ प्रति बीघा में है)
                let doseVal = parseFloat(product.doseSpray);
                if (!isNaN(doseVal)) {
                    doseText = `${doseVal * bigha} ${product.doseSpray.replace(/[0-9.]/g, '').trim() || 'ml'}`;
                } else {
                    doseText = product.doseSpray + ` (${bigha} बीघा के लिए)`;
                }
            } else {
                doseText = product.doseSpray || product.doseSeed || "—";
            }
            return doseText;
        }

        // ---------- बुवाई हाँ वाला केस (दिन / दवाई सर्च) ----------
        async function handleSownCase() {
            const bigha = parseFloat(document.getElementById('bigha').value) || 1;
            const crop = document.getElementById('cropSelect').value;
            const inputVal = document.getElementById('searchInput').value.trim();
            const resContent = document.getElementById('resContent');
            const resTitle = document.getElementById('resTitle');

            if (!inputVal) {
                resContent.innerHTML = "<div class='success-box'>⚠️ कृपया दिन या दवाई का नाम लिखें।</div>";
                return;
            }

            // पहले देखें कि इनपुट दिन (number) है या टेक्स्ट
            const isDay = !isNaN(inputVal) && inputVal !== "" && !isNaN(parseFloat(inputVal));
            
            if (isDay) {
                const day = parseInt(inputVal);
                resTitle.innerText = `🌾 फसल अवस्था: ${day} दिन (${crop}) | बीघा: ${bigha}`;
                // 1. स्टेज सलाह दिखाएँ
                let stagesHtml = "";
                const snapshot = await db.ref('crop_stages').once('value');
                let stageFound = false;
                snapshot.forEach(child => {
                    const stage = child.val();
                    if (stage.crop === crop && day >= stage.start && day <= stage.end) {
                        stagesHtml += `
                            <div class="success-box">
                                <h3 style="margin-top:0">${stage.title}</h3>
                                <p>${stage.msg}</p>
                                ${stage.alert ? `<div class="alert-info">⚠️ ${stage.alert}</div>` : ''}
                            </div>
                        `;
                        stageFound = true;
                    }
                });
                if (!stageFound) stagesHtml = "<div class='success-box'>😕 इस दिन के लिए डेटाबेस में कोई विशेष सलाह नहीं मिली।</div>";
                
                // 2. उस फसल और दिन के अनुसार दवाइयाँ दिखाएँ (सिर्फ उदाहरण के तौर पर सभी दवाइयाँ, लेकिन फिल्टर कर सकते हैं)
                let medHtml = "<h4>💊 संभावित दवाइयाँ (फसल के अनुसार)</h4>";
                const relevantProducts = allProducts.filter(p => {
                    if (!p.crops) return false;
                    return p.crops.includes(crop);
                });
                if (relevantProducts.length === 0) medHtml += "<p>इस फसल के लिए कोई दवाई नहीं मिली।</p>";
                else {
                    filteredProducts = relevantProducts;
                    currentPage = 1;
                    medHtml += renderProductsList();
                }
                resContent.innerHTML = stagesHtml + medHtml;
                renderPagination();
            } 
            else {
                // टेक्स्ट है – दवाई / तकनीकी नाम सर्च
                resTitle.innerText = `🔎 खोज परिणाम: "${inputVal}"`;
                const searchLower = inputVal.toLowerCase();
                const matched = allProducts.filter(p => 
                    (p.name && p.name.toLowerCase().includes(searchLower)) ||
                    (p.technical && p.technical.toLowerCase().includes(searchLower))
                );
                if (matched.length === 0) {
                    resContent.innerHTML = `
                        <div class='success-box'>
                            ❌ "${inputVal}" नाम की कोई दवाई डेटाबेस में नहीं मिली।<br>
                            कृपया <strong>तकनीकी नाम</strong> डालकर खोजें (जैसे इमिडाक्लोप्रिड, कार्बेन्डाजिम)।
                        </div>
                    `;
                    return;
                }
                filteredProducts = matched;
                currentPage = 1;
                resContent.innerHTML = renderProductsList();
                renderPagination();
            }
        }

        // बुवाई नहीं वाला केस (बीज उपचार / बुवाई पूर्व)
        async function handleNotSownCase() {
            const preOption = document.getElementById('selectedPreOption').value;
            
            // यदि बीज उपचार चुना है, तो seed_treatment.html पर रीडायरेक्ट करें
            if (preOption === 'seed') {
                window.location.href = "seed_treatment.html";
                return;
            }
            
            // अन्यथा (बुवाई पूर्व दवाई) – पहले की तरह प्रोडक्ट दिखाएँ
            const bigha = parseFloat(document.getElementById('bigha').value) || 1;
            const crop = document.getElementById('cropSelect').value;
            const resTitle = document.getElementById('resTitle');
            const resContent = document.getElementById('resContent');

            resTitle.innerText = `🧪 बुवाई पूर्व दवाएँ (${crop}) | बीघा: ${bigha}`;
            filteredProducts = allProducts.filter(p => p.dType === "Harbicide" || p.dType === "Insecticide" || p.dType === "Chipko");

            if (filteredProducts.length === 0) {
                resContent.innerHTML = "<div class='success-box'>⚠️ इस श्रेणी में कोई दवाई उपलब्ध नहीं है। कृपया पहले पैनल से जोड़ें।</div>";
                return;
            }
            currentPage = 1;
            resContent.innerHTML = renderProductsList();
            renderPagination();
        }

        // प्रोडक्ट्स को HTML में रेंडर करना
        function renderProductsList() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredProducts.slice(start, end);
            const bigha = parseFloat(document.getElementById('bigha').value) || 1;

            if (pageItems.length === 0) return "<p>कोई दवाई नहीं दिखा सकते।</p>";

            let html = "";
            pageItems.forEach(p => {
                const doseText = calculateDoseByArea(p, bigha);
                html += `
                    <div class="med-card">
                        <strong>🌿 ${p.name || p.technical || 'अज्ञात'}</strong><br>
                        🧪 तकनीकी: ${p.technical || '—'}<br>
                        📦 स्टॉक: ${(p.qty > 0) ? `${p.qty} ${p.packSize || 'यूनिट'}` : '❌ खत्म'}<br>
                        💰 मूल्य: ₹${p.price || '—'}<br>
                        <span class="dose-badge">💊 डोज़: ${doseText}</span>
                        ${p.partner ? `<span class="dose-badge">🤝 पार्टनर: ${p.partner}</span>` : ''}
                        ${p.specialLogic ? `<div style="margin-top:8px;font-size:0.8rem;background:#f5f5f5;padding:5px;border-radius:8px;">📊 स्पेशल: ${p.specialLogic}</div>` : ''}
                    </div>
                `;
            });
            return html;
        }

        // पेजिनेशन कंट्रोल्स
        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            const paginationDiv = document.getElementById('paginationControls');
            if (totalPages <= 1) {
                paginationDiv.innerHTML = "";
                return;
            }
            let btns = "";
            for (let i = 1; i <= totalPages; i++) {
                btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            paginationDiv.innerHTML = btns;
        }

        function goToPage(page) {
            currentPage = page;
            document.getElementById('resContent').innerHTML = renderProductsList();
            renderPagination();
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        // मुख्य हैंडलर
        async function handleSmartSearch() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = "block";
            const yesRadio = document.querySelector('input[name="buwai"][value="yes"]');
            const isBuwaiHaan = yesRadio.checked;
            
            if (isBuwaiHaan) {
                await handleSownCase();
            } else {
                await handleNotSownCase();
            }
        }

        // UI टॉगल फंक्शन
        function toggleBuwaiOptions() {
            const yesRadio = document.querySelector('input[name="buwai"][value="yes"]');
            const yesContainer = document.getElementById('yesContainer');
            const noContainer = document.getElementById('noContainer');
            if (yesRadio.checked) {
                yesContainer.classList.remove('hidden');
                noContainer.classList.add('hidden');
            } else {
                yesContainer.classList.add('hidden');
                noContainer.classList.remove('hidden');
            }
        }

        function selectPreOption(option) {
            const seedBtn = document.getElementById('seedTreatmentBtn');
            const preBtn = document.getElementById('preSowingBtn');
            const hiddenInput = document.getElementById('selectedPreOption');
            if (option === 'seed') {
                seedBtn.classList.add('selected');
                preBtn.classList.remove('selected');
                hiddenInput.value = 'seed';
            } else {
                seedBtn.classList.remove('selected');
                preBtn.classList.add('selected');
                hiddenInput.value = 'presowing';
            }
        }
    </script>
</body>
</html>
