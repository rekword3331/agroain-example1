<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agroain · स्मार्ट कृषि समाधान</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #8bc34a; --dark: #1b5e20; --light: #f1f8e9; --accent: #ff9800; --danger: #d32f2f; --info: #0288d1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f4; margin: 0; padding: 10px; }
        
        .page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 2000; transition: 0.5s; }
        .page-loader.hidden { opacity: 0; visibility: hidden; }
        .page-spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; flex-wrap: wrap; }
        .header h1 { margin: 0; color: var(--dark); font-size: 1.8rem; }
        .header select { padding: 8px 12px; border-radius: 30px; border: 2px solid var(--primary); background-color: var(--light); font-weight: bold; color: var(--dark); cursor: pointer; width: 160px; }
        .subtitle { text-align: center; color: #555; margin-top: 5px; font-size: 0.9rem; width: 100%; }
        
        .section { border: 1px solid #ddd; padding: 15px; border-radius: 12px; background: #fafafa; margin-bottom: 15px; }
        input, button, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
        
        .radio-group { display: flex; gap: 20px; margin: 15px 0; align-items: center; }
        .radio-group label { display: flex; align-items: center; gap: 5px; font-weight: 500; cursor: pointer; }
        .radio-group input[type="radio"] { width: auto; accent-color: var(--primary); }

        .hidden { display: none; }
        .option-buttons { display: flex; gap: 10px; margin: 10px 0; }
        .option-btn { background: #e8f5e9; color: #1b5e20; border: 2px solid #c8e6c9; padding: 10px; border-radius: 30px; font-weight: bold; cursor: pointer; text-align: center; flex: 1; transition: 0.2s; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--dark); }

        #result { display: none; margin-top: 20px; }
        .success-box { background: var(--light); padding: 15px; border-radius: 10px; border: 1px solid var(--secondary); margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .alert-info { background: #e3f2fd; border-left: 5px solid var(--info); padding: 10px; color: var(--info); font-weight: bold; margin-top: 10px; border-radius: 5px; }
        .med-card { background: #fff; border: 1px solid #c8e6c9; border-radius: 10px; padding: 12px; margin-top: 10px; border-left: 4px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="page-loader" id="pageLoader"><div class="page-spinner"></div></div>

    <div class="container">
        <div class="header">
            <h1>Agroain</h1>
            <div class="crop-selector">
                <select id="cropSelect">
                    <!-- यहाँ 20 फसलों के विकल्प दिए गए हैं -->
                    <option value="सोयाबीन">सोयाबीन</option>
                    <option value="मक्का">मक्का</option>
                    <option value="गेहूं">गेहूं</option>
                    <option value="लहसुन">लहसुन</option>
                    <option value="प्याज">प्याज</option>
                    <option value="आलू">आलू</option>
                    <option value="धान">धान (चावल)</option>
                    <option value="गन्ना">गन्ना</option>
                    <option value="कपास">कपास</option>
                    <option value="मूंगफली">मूंगफली</option>
                    <option value="सरसों">सरसों</option>
                    <option value="चना">चना</option>
                    <option value="मटर">मटर</option>
                    <option value="मसूर">मसूर (दाल)</option>
                    <option value="जौ">जौ</option>
                    <option value="ज्वार">ज्वार</option>
                    <option value="बाजरा">बाजरा</option>
                    <option value="तिल">तिल</option>
                    <option value="सूरजमुखी">सूरजमुखी</option>
                    <option value="अरहर">अरहर (तुअर)</option>
                </select>
            </div>
            <div class="subtitle">सही डोज सही मात्रा बेहतरीन क्वालिटी</div>
        </div>

        <div class="section">
            <label>🧾 आप की जमीन कितने बीघा है</label>
            <!-- बीघा के लिए नंबर इनपुट (कोई भी संख्या डाल सकते हैं) -->
            <input type="number" id="bigha" value="1" min="0.1" step="0.1" placeholder="जितने बीघा, वो दर्ज करें" style="margin-bottom: 15px;">

            <label>🌱 क्या फसल की बुवाई कर दी है?</label>
            <div class="radio-group">
                <label><input type="radio" name="buwai" value="yes" checked onchange="toggleBuwaiOptions()"> हाँ</label>
                <label><input type="radio" name="buwai" value="no" onchange="toggleBuwaiOptions()"> नहीं</label>
            </div>

            <div id="yesContainer">
                <label>आप की फसल कितने दिन की है</label>
                <input type="text" id="smartInput" placeholder="उदा. 30 या 'Fipronil'">
            </div>

            <div id="noContainer" class="hidden">
                <label>🧴 कृपया चुनें:</label>
                <div class="option-buttons">
                    <div id="seedTreatmentBtn" class="option-btn selected" onclick="selectPreOption('seed')">🌾 बीज उपचार</div>
                    <div id="preSowingBtn" class="option-btn" onclick="selectPreOption('presowing')">🧪 बुवाई पूर्व</div>
                </div>
                <input type="hidden" id="selectedPreOption" value="seed">
            </div>

            <button onclick="handleSmartSearch()">दवाई और स्टेज देखें</button>
        </div>

        <div id="result">
            <h3 id="resTitle">🔍 परिणाम</h3>
            <div id="resContent"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            databaseURL: "https://agroain-default-rtdb.firebaseio.com/",
            projectId: "agroain-default-rtdb",
        };
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();
        const db = firebase.firestore();

        window.onload = () => {
            setTimeout(() => document.getElementById('pageLoader').classList.add('hidden'), 1000);
        };

        function toggleBuwaiOptions() {
            const isYes = document.querySelector('input[name="buwai"][value="yes"]').checked;
            document.getElementById('yesContainer').style.display = isYes ? 'block' : 'none';
            document.getElementById('noContainer').style.display = isYes ? 'none' : 'block';
        }

        function selectPreOption(opt) {
            document.getElementById('seedTreatmentBtn').classList.toggle('selected', opt === 'seed');
            document.getElementById('preSowingBtn').classList.toggle('selected', opt === 'presowing');
            document.getElementById('selectedPreOption').value = opt;
        }

        async function handleSmartSearch() {
            const isBuwaiHaan = document.querySelector('input[name="buwai"][value="yes"]').checked;
            const bigha = document.getElementById('bigha').value;
            const selectedCrop = document.getElementById('cropSelect').value;
            const res = document.getElementById('result');
            const content = document.getElementById('resContent');
            const title = document.getElementById('resTitle');

            res.style.display = "block";
            content.innerHTML = "खोज रहे हैं...";

            if (isBuwaiHaan) {
                const inputVal = document.getElementById('smartInput').value.trim();
                if (!inputVal) return alert("कृपया दिन या दवा का नाम लिखें");

                // --- LOGIC 1: अगर नंबर है (CROP STAGES) ---
                if (!isNaN(inputVal)) {
                    title.innerText = `अवस्था: ${inputVal} दिन (${selectedCrop})`;
                    rdb.ref('crop_stages').once('value', (snap) => {
                        content.innerHTML = "";
                        let found = false;
                        snap.forEach((child) => {
                            const s = child.val();
                            // फसल मैच करना + दिन की रेंज चेक करना
                            if (s.crop === selectedCrop && parseInt(inputVal) >= s.start && parseInt(inputVal) <= s.end) {
                                content.innerHTML += `
                                    <div class="success-box">
                                        <h3>${s.title}</h3>
                                        <p>${s.msg}</p>
                                        ${s.alert ? `<div class="alert-info">⚠️ ${s.alert}</div>` : ''}
                                    </div>`;
                                found = true;
                            }
                        });
                        if (!found) content.innerHTML = `<div class="success-box">इस दिन के लिए कोई विशेष डेटा नहीं मिला।</div>`;
                    });
                } 
                // --- LOGIC 2: अगर टेक्स्ट है (PRODUCT SEARCH) ---
                else {
                    title.innerText = "दवा की जानकारी";
                    try {
                        const snap = await db.collection('products')
                            .where('searchKeywords', 'array-contains', inputVal.toLowerCase())
                            .get();
                        
                        if (snap.empty) {
                            content.innerHTML = `<div class="success-box">दवा '${inputVal}' नहीं मिली।</div>`;
                        } else {
                            content.innerHTML = "";
                            snap.forEach(doc => {
                                const p = doc.data();
                                content.innerHTML += `
                                    <div class="med-card">
                                        <strong style="color:var(--primary)">🌿 ${p.name}</strong><br>
                                        <span>🧪 टेक्निकल: ${p.technical || '-'}</span><br>
                                        <span>📦 स्टॉक: ${p.stock > 0 ? '✅ उपलब्ध' : '❌ खत्म'}</span>
                                    </div>`;
                            });
                        }
                    } catch (e) { content.innerHTML = "सर्वर एरर!"; }
                }
            } else {
                // --- LOGIC 3: बुवाई नहीं हुई (SEED/PRE-SOWING) ---
                const opt = document.getElementById('selectedPreOption').value;
                const category = opt === 'seed' ? "seed_treatment" : "pre_sowing";
                title.innerText = opt === 'seed' ? "बीज उपचार" : "बुवाई पूर्व दवाई";
                
                try {
                    const snap = await db.collection('products').where('category', '==', category).get();
                    content.innerHTML = "";
                    if(snap.empty) {
                        content.innerHTML = `<div class="success-box">कोई डेटा उपलब्ध नहीं है।</div>`;
                    } else {
                        snap.forEach(doc => {
                            const p = doc.data();
                            content.innerHTML += `<div class="med-card"><strong>🌿 ${p.name}</strong><br>🧪 ${p.technical || '-'}<br>📦 स्टॉक: उपलब्ध</div>`;
                        });
                    }
                } catch(e) { content.innerHTML = "डेटा लोड करने में समस्या।"; }
            }
        }
    </script>
</body>
</html>
