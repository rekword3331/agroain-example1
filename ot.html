<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROAIN</title>
    <style>
        /* --- CSS Styling --- */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input[type="number"],
        .input-group select {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background-color: #45a049;
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9ffe9;
            border: 1px solid #d4ffd4;
            border-radius: 6px;
            text-align: left;
            display: none; /* Hidden by default */
        }

        .results p {
            margin: 8px 0;
            font-size: 17px;
            color: #333;
        }

        .results strong {
            color: #2e8b57;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AGROAIN</h1>

        <div class="input-group">
            <label for="biga">Enter Biga:</label>
            <input type="number" id="biga" min="0" placeholder="e.g., 1, 2.5">
        </div>

        <div class="input-group">
            <label for="pesticide">Select Pesticide:</label>
            <select id="pesticide">
                <option value="">--Please Select--</option>
                <option value="thiamethoxam_lambda">Thiamethoxam + Lambda Cyhalothrin 9.5% ZC</option>
                <option value="emamectin_benzoate">Emamectin Benzoate 5% SG</option>
                <option value="combined">Thiamethoxam + Lambda Cyhalothrin 9.5% ZC & Emamectin Benzoate 5% SG (Combined)</option>
                <option value="chipko">Chipko</option>
            </select>
        </div>
        
        <button id="calculateBtn">Calculate</button>

        <div id="results" class="results">
            </div>
    </div>

    <script>
        /* --- JavaScript Logic --- */
        document.addEventListener('DOMContentLoaded', () => {
            const bigaInput = document.getElementById('biga');
            const pesticideSelect = document.getElementById('pesticide');
            const calculateBtn = document.getElementById('calculateBtn');
            const resultsDiv = document.getElementById('results');

            calculateBtn.addEventListener('click', calculatePesticide);

            function calculatePesticide() {
                resultsDiv.innerHTML = ''; // Clear previous results
                resultsDiv.style.display = 'none'; // Hide results by default
                resultsDiv.classList.remove('error'); // Remove error class if present

                const biga = parseFloat(bigaInput.value);
                const selectedPesticide = pesticideSelect.value;

                if (isNaN(biga) || biga <= 0) {
                    resultsDiv.style.display = 'block';
                    resultsDiv.classList.add('error');
                    resultsDiv.innerHTML = '<p>Please enter a valid number for Biga.</p>';
                    return;
                }

                if (selectedPesticide === '') {
                    resultsDiv.style.display = 'block';
                    resultsDiv.classList.add('error');
                    resultsDiv.innerHTML = '<p>Please select a pesticide.</p>';
                    return;
                }

                let resultsHTML = '';

                switch (selectedPesticide) {
                    case 'thiamethoxam_lambda':
                        const amountNeededThiamethoxam = biga * 60; // 60 ml per biga
                        resultsHTML += `<p><strong>Dawai Name: Thiamethoxam + Lambda Cyhalothrin 9.5% ZC</strong></p>`;
                        resultsHTML += `<p><strong>Total Dawai:</strong> ${amountNeededThiamethoxam} ml</p>`;
                        resultsHTML += `<p><strong>Package Options:</strong> 1 Liter (1000ml), 500ml, 250ml</p>`;
                        if (amountNeededThiamethoxam > 1000) {
                            resultsHTML += `<p>Recommended purchase: Approximately ${Math.ceil(amountNeededThiamethoxam / 1000)} x 1 Liter bottle(s) or a combination of smaller packs.</p>`;
                        } else if (amountNeededThiamethoxam > 500) {
                             resultsHTML += `<p>Recommended purchase: 1 x 1 Liter bottle or 2 x 500ml bottles or a combination.</p>`;
                        } else if (amountNeededThiamethoxam > 250) {
                            resultsHTML += `<p>Recommended purchase: 1 x 500ml bottle or 2 x 250ml bottles or a combination.</p>`;
                        } else {
                            resultsHTML += `<p>Recommended purchase: 1 x 250ml bottle or smaller if available.</p>`;
                        }
                        break;
                    case 'emamectin_benzoate':
                        const amountNeededEmamectin = biga * 70; // 70 gm per biga
                        resultsHTML += `<p><strong>Dawai Name: Emamectin Benzoate 5% SG</strong></p>`;
                        resultsHTML += `<p><strong>Total Dawai:</strong> ${amountNeededEmamectin} gm</p>`;
                        resultsHTML += `<p><strong>Package Options:</strong> 1 kg (1000gm), 500gm, 250gm</p>`;
                        if (amountNeededEmamectin > 1000) {
                            resultsHTML += `<p>Recommended purchase: Approximately ${Math.ceil(amountNeededEmamectin / 1000)} x 1 kg pack(s) or a combination of smaller packs.</p>`;
                        } else if (amountNeededEmamectin > 500) {
                            resultsHTML += `<p>Recommended purchase: 1 x 1 kg pack or 2 x 500gm packs or a combination.</p>`;
                        } else if (amountNeededEmamectin > 250) {
                            resultsHTML += `<p>Recommended purchase: 1 x 500gm pack or 2 x 250gm packs or a combination.</p>`;
                        } else {
                            resultsHTML += `<p>Recommended purchase: 1 x 250gm pack or smaller if available.</p>`;
                        }
                        break;
                    case 'combined': // New combined option
                        const combinedAmount = biga * 50; // 50 gm/ml per biga for each when combined
                        resultsHTML += `<p><strong>For Combined Application:</strong></p>`;
                        
                        resultsHTML += `<p><strong>Dawai Name: Thiamethoxam + Lambda Cyhalothrin 9.5% ZC</strong></p>`;
                        resultsHTML += `<p><strong>Total Dawai:</strong> ${combinedAmount} ml</p>`;
                        resultsHTML += `<p><strong>Package Options:</strong> 1 Liter (1000ml), 500ml, 250ml</p>`;
                        if (combinedAmount > 1000) {
                            resultsHTML += `<p>Recommended purchase: Approximately ${Math.ceil(combinedAmount / 1000)} x 1 Liter bottle(s) or a combination of smaller packs.</p>`;
                        } else if (combinedAmount > 500) {
                             resultsHTML += `<p>Recommended purchase: 1 x 1 Liter bottle or 2 x 500ml bottles or a combination.</p>`;
                        } else if (combinedAmount > 250) {
                            resultsHTML += `<p>Recommended purchase: 1 x 500ml bottle or 2 x 250ml bottles or a combination.</p>`;
                        } else {
                            resultsHTML += `<p>Recommended purchase: 1 x 250ml bottle or smaller if available.</p>`;
                        }

                        resultsHTML += `<br><p><strong>Dawai Name: Emamectin Benzoate 5% SG</strong></p>`;
                        resultsHTML += `<p><strong>Total Dawai:</strong> ${combinedAmount} gm</p>`;
                        resultsHTML += `<p><strong>Package Options:</strong> 1 kg (1000gm), 500gm, 250gm</p>`;
                        if (combinedAmount > 1000) {
                            resultsHTML += `<p>Recommended purchase: Approximately ${Math.ceil(combinedAmount / 1000)} x 1 kg pack(s) or a combination of smaller packs.</p>`;
                        } else if (combinedAmount > 500) {
                            resultsHTML += `<p>Recommended purchase: 1 x 1 kg pack or 2 x 500gm packs or a combination.</p>`;
                        } else if (combinedAmount > 250) {
                            resultsHTML += `<p>Recommended purchase: 1 x 500gm pack or 2 x 250gm packs or a combination.</p>`;
                        } else {
                            resultsHTML += `<p>Recommended purchase: 1 x 250gm pack or smaller if available.</p>`;
                        }
                        break;
                    case 'chipko':
                        const amountNeededChipko = biga * 15; // 15 ml per biga
                        resultsHTML += `<p><strong>Dawai Name: Chipko</strong></p>`;
                        resultsHTML += `<p><strong>Total Dawai:</strong> ${amountNeededChipko} ml</p>`;
                        resultsHTML += `<p><strong>Package Options:</strong> 250ml, 100ml</p>`;
                        if (amountNeededChipko > 250) {
                            resultsHTML += `<p>Recommended purchase: Approximately ${Math.ceil(amountNeededChipko / 250)} x 250ml bottle(s) or a combination of smaller packs.</p>`;
                        } else if (amountNeededChipko > 100) {
                            resultsHTML += `<p>Recommended purchase: 1 x 250ml bottle or 2 x 100ml bottles or a combination.</p>`;
                        } else {
                            resultsHTML += `<p>Recommended purchase: 1 x 100ml bottle or smaller if available.</p>`;
                        }
                        break;
                    default:
                        resultsHTML = '<p>No calculation performed. Please select a pesticide and enter a valid Biga amount.</p>';
                        break;
                }

                resultsDiv.innerHTML = resultsHTML;
                resultsDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
