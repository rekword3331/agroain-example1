<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agroain · सोयाबीन सुरक्षा (संयुक्त)</title>

    <!-- Firebase लाइब्रेरी (आवश्यक) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #8bc34a; --dark: #1b5e20; --light: #f1f8e9; --accent: #ff9800; --danger: #d32f2f; --info: #0288d1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f4; margin: 0; padding: 10px; }
        /* स्प्लैश स्क्रीन (AGRO FAST SPINNER) */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .page-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #e0e0e0;
            border-top: 8px solid #2e7d32;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* स्टेगर्ड फेड-इन एनिमेशन */
        .fade-up {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .header-animate { animation-delay: 0.1s; }
        .section1-animate { animation-delay: 0.3s; }
        .section2-animate { animation-delay: 0.5s; }
        .result-animate { animation-delay: 0.7s; }

        .container { 
            max-width: 600px; 
            width: 100%; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            margin: auto; 
            box-sizing: border-box; 
        }
        header { 
            text-align: center; 
            margin-bottom: 20px; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 10px; 
        }
        h1 { color: var(--primary); margin: 0; font-size: 2rem; }
        .section { 
            border: 1px solid #e0e0e0; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            background: #fafafa; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: var(--dark); 
            font-size: 0.95rem; 
        }
        input, select { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
            width: 100%; 
        }
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            width: auto; 
        }
        .option-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 10px; 
        }
        .option-item { 
            background: white; 
            border: 1px solid #ddd; 
            padding: 10px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.9rem; 
        }
        .chipko-selected { 
            border: 2px solid var(--primary); 
            background: #e8f5e9; 
            font-weight: bold; 
        }
        #result { 
            margin-top: 20px; 
            display: none; 
            border-top: 2px solid var(--secondary); 
            padding-top: 15px; 
        }
        .alert-warning { 
            background: #ffebee; 
            border-left: 5px solid var(--danger); 
            padding: 15px; 
            color: var(--danger); 
            margin-top: 10px; 
            font-weight: bold; 
        }
        .alert-info { 
            background: #e3f2fd; 
            border-left: 5px solid var(--info); 
            padding: 15px; 
            color: var(--info); 
            margin-top: 10px; 
            font-weight: bold; 
        }
        .success-box { 
            background: var(--light); 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid var(--secondary); 
        }
        .advance-order { 
            background: #fffde7; 
            border: 1px dashed var(--accent); 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-weight: bold; 
            color: #f57f17; 
        }
        hr { 
            border: 0; 
            border-top: 1px solid #ddd; 
            margin: 15px 0; 
        }
        .main-option { 
            display: flex; 
            gap: 20px; 
            margin: 15px 0; 
            flex-wrap: wrap; 
        }
        .main-option label { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-weight: normal; 
        }
        .sub-options { 
            margin-top: 15px; 
            padding: 10px; 
            background: #f5f5f5; 
            border-radius: 8px; 
        }
        .medicine-result { 
            margin-top: 15px; 
            padding: 10px; 
            background: #e8f5e9; 
            border-radius: 8px; 
            font-weight: bold; 
            border-left: 4px solid var(--primary); 
        }

        /* नई पंक्ति के लिए - डेस्कटॉप लेआउट */
        .label-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .label-row label { flex: 1; margin-bottom: 0; }
        .label-row label:first-child { max-width: 100px; } /* बीघा लेबल के लिए छोटी जगह */
        .search-row { display: flex; gap: 10px; align-items: center; }
        #bigha { width: 100px; flex-shrink: 0; }  /* बीघा इनपुट छोटा */
        #smartSearch { flex: 1; }                 /* दिन/नाम इनपुट बाकी जगह लेगा */
        .search-row button { width: auto; flex-shrink: 0; }

        /* मोबाइल के लिए सुधार */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            h1 { font-size: 1.8rem; }
            .label-row { flex-direction: column; gap: 5px; }
            .label-row label { max-width: none !important; width: 100%; }
            .search-row { flex-direction: column; align-items: stretch; }
            #bigha { width: 100% !important; }
            #smartSearch { width: 100%; }
            .search-row button { width: 100%; margin-top: 5px; }
            .main-option { flex-direction: column; gap: 10px; }
            .option-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- स्प्लैश स्क्रीन -->
    <div class="page-loader" id="pageLoader">
        <div class="page-spinner"></div>
    </div>

    <div class="container">
        <header id="header">
            <h1>Agroain</h1>
            <p>सही डोज · सही मात्रा · बेहतरीन क्वालिटी</p>
        </header>

        <!-- सर्च सेक्शन (बीघा + स्मार्ट सर्च) -->
        <div class="section" id="section1">
            <div class="label-row">
                <label for="bigha">🧾 कितने बीघा ?</label>
            </div>
            <div class="search-row">
                <input type="number" id="bigha" min="0" step="0.01" placeholder="बीघा" value="1">
                <input type="text" id="smartSearch" placeholder="दिन या दवा का नाम (जैसे 25, कोराजीन)">
                <button onclick="handleSmartSearch()">खोजें</button>
            </div>
        </div>

        <!-- परिणाम दिखाने वाला क्षेत्र -->
        <div id="result">
            <h3 id="resTitle"></h3>
            <div id="resContent"></div>
        </div>
    </div>

    <script>
        // ---------- FIREBASE CONFIG (अपनी जानकारी से बदलें) ----------
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",                // 👈 यहाँ अपनी API key लिखें
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ---------- ग्लोबल वेरिएबल ----------
        let currentCropDays = 0;   // फसल की उम्र (दिन)

        // ---------- स्प्लैश + एनिमेशन (पहले कोड के अनुसार) ----------
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
                document.getElementById('header').classList.add('fade-up', 'header-animate');
                document.getElementById('section1').classList.add('fade-up', 'section1-animate');
            }, 3000);
        };

        // ---------- हैंडल सर्च (नंबर / टेक्स्ट) ----------
        async function handleSmartSearch() {
            const query = document.getElementById('smartSearch').value.trim();
            if (query === '') {
                alert('कृपया कुछ लिखें (दिन या दवा का नाम)');
                return;
            }

            // अगर यूज़र ने सिर्फ़ नंबर डाला है → फसल अवस्था जाँचें
            if (!isNaN(query) && query !== '') {
                const days = parseInt(query);
                if (days >= 0) {
                    currentCropDays = days;
                    checkStage(days);
                } else {
                    alert('दिन सही नहीं है');
                }
            } else {
                // टेक्स्ट है → Firebase में खोजें
                await searchMed(query);
            }
        }

        // ---------- FIREBASE से दवा खोजें (उन्नत संस्करण) ----------
        async function searchMed(term) {
            const termLower = term.toLowerCase();
            const res = document.getElementById('result');
            const resTitle = document.getElementById('resTitle');
            const resContent = document.getElementById('resContent');
            
            res.style.display = "block";
            resTitle.innerText = "🔍 खोज परिणाम";
            resContent.innerHTML = `<div class="success-box">डेटाबेस में खोज रहे हैं... <span class="page-spinner" style="width:24px;height:24px;border-width:3px;display:inline-block;margin-left:10px;"></span></div>`;

            try {
                // Firestore के 'products' collection में searchKeywords array-contains क्वेरी
                const snapshot = await db.collection('products')
                    .where('searchKeywords', 'array-contains', termLower)
                    .get();

                if (snapshot.empty) {
                    resContent.innerHTML = `<div class="success-box">
                        😕 नमस्ते! '${term}' के नाम से कोई दवा नहीं मिली।<br>
                        क्या आप इसका <strong>टेक्निकल नाम</strong> बता सकते हैं?<br>
                        <span style="color:var(--accent);">(जैसे: क्लोरपाइरीफॉस, इमामेक्टिन)</span>
                    </div>`;
                } else {
                    let html = '<div class="success-box" style="max-height:350px; overflow-y:auto;">';
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        html += `
                            <div style="border-bottom:1px solid #c8e6c9; padding:12px 0;">
                                <strong style="color:var(--primary); font-size:1.1rem;">🌿 ${data.name}</strong><br>
                                <span style="font-size:0.95rem;">🧪 टेक्निकल: ${data.technical || '—'}</span><br>
                                <span>💰 कीमत: <strong>₹${data.price || '?'}</strong> | 📦 स्टॉक: ${(data.stock > 0) ? '✅ उपलब्ध' : '❌ खत्म'}</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                    resContent.innerHTML = html;
                }
            } catch (error) {
                console.error("Firebase search error:", error);
                resContent.innerHTML = `<div class="alert-warning">⚠️ सर्वर एरर! इंटरनेट कनेक्शन जाँचें या बाद में प्रयास करें।</div>`;
            }
        }

        // ---------- फसल अवस्था के अनुसार जानकारी (पूरा लॉजिक पहले कोड से) ----------
        function checkStage(days) {
            const res = document.getElementById('result');
            const resTitle = document.getElementById('resTitle');
            const resContent = document.getElementById('resContent');

            res.style.display = "block";
            resContent.innerHTML = "";

            if (days === 0) {
                resTitle.innerText = "बुवाई से पहले (बीज उपचार)";
                resContent.innerHTML = `<div class="success-box">सबसे पहले <b>बीज उपचार</b> करें (ज़ायलोरा/साफ/थायोमेथोक्सम)। उपचार के बाद ही बुवाई करें।</div>`;
            }
            else if (days > 0 && days <= 3) {
                resTitle.innerText = "बुवाई के 72 घंटे के भीतर";
                resContent.innerHTML = `<div class="success-box">बुवाई के 72 घंटे के भीतर <b>अथॉरिटी</b> या <b>मेघमनी पाउच</b> का स्प्रे करें।</div>`;
            }
            else if (days >= 4 && days <= 13) {
                resTitle.innerText = "तैयारी का समय (4-13 दिन)";
                resContent.innerHTML = `
                    <div class="success-box">
                        <p>खरपतवार नाशक का समय आने वाला है।</p>
                        <div class="advance-order">📦 आप चारामार दवाई का ऑर्डर एडवांस में कर सकते हैं ताकि डिलीवरी फास्ट हो सके।</div>
                        <div class="alert-info">⚠️ ध्यान दें: स्प्रे न्यूनतम 14 दिन पूरे होने पर ही करना है।</div>
                    </div>`;
            }
            else if (days >= 14 && days <= 70) {
                resTitle.innerText = `फसल सुरक्षा अवस्था (${days} दिन)`;
                let content = `<div class="success-box">`;
                
                if (days <= 45) {
                    if (days < 25) {
                        content += `<p>✅ आप <b>खरपतवार नाशक (चारामार)</b> दवा का उपयोग कर सकते हैं।</p>`;
                        content += `<div class="sub-options" id="herbicideOnly">`;
                        content += generateCharamarSubOptions();
                        content += `</div>`;
                        content += `<button id="submitMedBtn" onclick="showMedicine()">दवाई देखें</button>`;
                        content += `<div id="medicineDisplay" class="medicine-result" style="display:none;"></div>`;
                    } else {
                        content += `<p><b>मुख्य विकल्प चुनें:</b></p>`;
                        content += generateMainOptions(days);
                    }
                } else {
                    content += `<p style="color:var(--danger);">⚠️ खरपतवार नाशक का समय निकल चुका है। अब केवल इल्ली नियंत्रण संभव है।</p>`;
                    content += `<div id="subOptionsContainer">`;
                    if (days <= 55) {
                        content += generateIlliSubOptions(true, true);
                    } else {
                        content += generateIlliSubOptions(true, false);
                    }
                    content += `</div>`;
                    content += `<button id="submitMedBtn" onclick="showMedicine()">दवाई देखें</button>`;
                    content += `<div id="medicineDisplay" class="medicine-result" style="display:none;"></div>`;
                }
                
                content += `</div>`;
                resContent.innerHTML = content;

                if (days >= 25 && days <= 45) {
                    attachMainOptionListeners(days);
                }
            }
            else if (days > 70) {
                resTitle.innerText = "अंतिम सुरक्षा (71-120 दिन)";
                resContent.innerHTML = `
                    <div class="success-box">
                        <p>अब केवल <b>भारी इल्ली की दवा</b> + <b>चिपको</b> का छिड़काव करें।</p>
                        <div class="sub-options">
                            <div class="option-item chipko-selected">
                                <input type="checkbox" id="chipkoCheck" checked disabled> चिपको (Silicon) ✅
                            </div>
                            <p><b>इल्ली की तीव्रता:</b></p>
                            <div class="option-grid">
                                <div class="option-item"><input type="radio" name="illiStrength" value="heavy" checked> भारी इल्ली</div>
                            </div>
                        </div>
                        <button id="submitMedBtn" onclick="showMedicine()">दवाई देखें</button>
                        <div id="medicineDisplay" class="medicine-result" style="display:none;"></div>
                    </div>`;
            }
        }

        // ---------- सहायक जनरेटर फंक्शन (पहले कोड से) ----------
        function generateMainOptions(days) {
            return `
                <div class="main-option">
                    <label><input type="radio" name="mainOption" value="charamar" checked> चारामार (खरपतवार नाशक)</label>
                    <label><input type="radio" name="mainOption" value="illi"> इल्ली नियंत्रण</label>
                </div>
                <div id="subOptionsContainer">
                    ${generateCharamarSubOptions()}
                </div>
                <button id="submitMedBtn" onclick="showMedicine()">दवाई देखें</button>
                <div id="medicineDisplay" class="medicine-result" style="display:none;"></div>
            `;
        }

        function generateCharamarSubOptions() {
            return `
                <div class="sub-options">
                    <p><b>चारामार दवाई:</b> आप निम्न में से कोई एक चुन सकते हैं:</p>
                    <select id="charamarSelect">
                        <option value="quizalofop">क्विज़लोफॉप-एथिल 5% EC (टार्गा सुपर)</option>
                        <option value="fenoxaprop">फेनोक्साप्रॉप-पी-एथिल 9.3% EC (व्हीट किलर)</option>
                        <option value="clodinafop">क्लोडिनाफॉप-प्रोपार्जिल 15% WP (टॉपिक)</option>
                    </select>
                    <p style="font-size:0.9rem; color:var(--info);">⚠️ यह दवा केवल 14-45 दिन के बीच प्रभावी है।</p>
                </div>
            `;
        }

        function generateIlliSubOptions(onlyIlli = false, includeTonicMicro = false) {
            let html = `
                <div class="sub-options">
                    <p><b>इल्ली नियंत्रण के विकल्प:</b></p>
                    <div class="option-grid">
                        <div class="option-item chipko-selected">
                            <input type="checkbox" id="chipkoCheck" checked disabled> चिपको (Silicon) ✅
                        </div>
                        <div class="option-item">
                            <input type="checkbox" id="fungicideCheck"> फफूंदनाशक (Fungicide)
                        </div>
                    </div>
                    <p><b>इल्ली की तीव्रता:</b></p>
                    <div class="option-grid">
                        <div class="option-item"><input type="radio" name="illiStrength" value="light" checked> हल्की इल्ली</div>
                        <div class="option-item"><input type="radio" name="illiStrength" value="medium"> मध्यम इल्ली</div>
                        <div class="option-item"><input type="radio" name="illiStrength" value="heavy"> भारी इल्ली</div>
                    </div>
            `;
            
            if (includeTonicMicro) {
                html += `
                    <hr>
                    <p><b>अतिरिक्त विकल्प (25-55 दिन):</b></p>
                    <div class="option-grid">
                        <div class="option-item">
                            <input type="checkbox" id="tonicCheck"> टॉनिक (19:19:19)
                        </div>
                        <div class="option-item">
                            <input type="checkbox" id="microCheck"> सूक्ष्म पोषक तत्व
                        </div>
                    </div>
                `;
            }
            
            html += `<p style="font-size:0.9rem; color:var(--info);">💡 चिपको हमेशा शामिल रहेगा।</p>`;
            html += `</div>`;
            return html;
        }

        function attachMainOptionListeners(days) {
            const radios = document.querySelectorAll('input[name="mainOption"]');
            const container = document.getElementById('subOptionsContainer');
            if (!radios.length || !container) return;
            
            radios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'charamar') {
                        container.innerHTML = generateCharamarSubOptions();
                    } else {
                        container.innerHTML = generateIlliSubOptions(false, days <= 55);
                    }
                    const medDisplay = document.getElementById('medicineDisplay');
                    if (medDisplay) medDisplay.style.display = 'none';
                });
            });
        }

        // ---------- दवाई दिखाएँ (showMedicine) पहले कोड से ----------
        function showMedicine() {
            const displayDiv = document.getElementById('medicineDisplay');
            if (!displayDiv) return;
            
            let medicineText = "";
            const days = currentCropDays;

            const tonicCheck = document.getElementById('tonicCheck');
            const microCheck = document.getElementById('microCheck');
            const tonicSelected = tonicCheck ? tonicCheck.checked : false;
            const microSelected = microCheck ? microCheck.checked : false;

            const mainSelected = document.querySelector('input[name="mainOption"]:checked');
            
            if (days >= 14 && days <= 24) {
                const charamarSelect = document.getElementById('charamarSelect');
                if (charamarSelect) {
                    const selected = charamarSelect.value;
                    if (selected === 'quizalofop') medicineText = "चारामार: क्विज़लोफॉप-एथिल 5% EC (टार्गा सुपर) - 400 मिली/एकड़";
                    else if (selected === 'fenoxaprop') medicineText = "चारामार: फेनोक्साप्रॉप-पी-एथिल 9.3% EC (व्हीट किलर) - 300 मिली/एकड़";
                    else if (selected === 'clodinafop') medicineText = "चारामार: क्लोडिनाफॉप-प्रोपार्जिल 15% WP (टॉपिक) - 200 ग्राम/एकड़";
                }
            }
            else if (days >= 25 && days <= 45) {
                if (mainSelected && mainSelected.value === 'charamar') {
                    const charamarSelect = document.getElementById('charamarSelect');
                    if (charamarSelect) {
                        const selected = charamarSelect.value;
                        if (selected === 'quizalofop') medicineText = "चारामार: क्विज़लोफॉप-एथिल 5% EC (टार्गा सुपर) - 400 मिली/एकड़";
                        else if (selected === 'fenoxaprop') medicineText = "चारामार: फेनोक्साप्रॉप-पी-एथिल 9.3% EC (व्हीट किलर) - 300 मिली/एकड़";
                        else if (selected === 'clodinafop') medicineText = "चारामार: क्लोडिनाफॉप-प्रोपार्जिल 15% WP (टॉपिक) - 200 ग्राम/एकड़";
                    }
                } else if ((mainSelected && mainSelected.value === 'illi') || days > 45) {
                    const illiStrength = document.querySelector('input[name="illiStrength"]:checked');
                    const fungicide = document.getElementById('fungicideCheck')?.checked;
                    if (illiStrength) {
                        let strength = illiStrength.value;
                        if (strength === 'light') medicineText = "हल्की इल्ली के लिए: क्लोरपाइरीफॉस 20% EC (लार्सन) या साइपरमेथ्रिन 10% EC";
                        else if (strength === 'medium') medicineText = "मध्यम इल्ली के लिए: इमामेक्टिन बेंजोएट 5% SG (प्रोक्लेम)";
                        else if (strength === 'heavy') medicineText = "भारी इल्ली के लिए: क्लोरेंट्रानिलिप्रोल 18.5% SC (कोराजीन)";
                        if (fungicide) medicineText += " + फफूंदनाशक (जैसे टेबुकोनाजोल)";
                        if (tonicSelected) medicineText += " + टॉनिक (19:19:19 @ 2 ग्राम/लीटर)";
                        if (microSelected) medicineText += " + सूक्ष्म पोषक तत्व (जैसे जिंक, बोरॉन)";
                        medicineText += " + चिपको (सिलिकॉन)";
                    } else {
                        medicineText = "कृपया इल्ली की तीव्रता चुनें।";
                    }
                }
            }
            else if (days > 45 && days <= 55) {
                const illiStrength = document.querySelector('input[name="illiStrength"]:checked');
                const fungicide = document.getElementById('fungicideCheck')?.checked;
                if (illiStrength) {
                    let strength = illiStrength.value;
                    if (strength === 'light') medicineText = "हल्की इल्ली के लिए: क्लोरपाइरीफॉस 20% EC (लार्सन) या साइपरमेथ्रिन 10% EC";
                    else if (strength === 'medium') medicineText = "मध्यम इल्ली के लिए: इमामेक्टिन बेंजोएट 5% SG (प्रोक्लेम)";
                    else if (strength === 'heavy') medicineText = "भारी इल्ली के लिए: क्लोरेंट्रानिलिप्रोल 18.5% SC (कोराजीन)";
                    if (fungicide) medicineText += " + फफूंदनाशक (जैसे टेबुकोनाजोल)";
                    if (tonicSelected) medicineText += " + टॉनिक (19:19:19 @ 2 ग्राम/लीटर)";
                    if (microSelected) medicineText += " + सूक्ष्म पोषक तत्व (जैसे जिंक, बोरॉन)";
                    medicineText += " + चिपको (सिलिकॉन)";
                } else {
                    medicineText = "कृपया इल्ली की तीव्रता चुनें।";
                }
            }
            else if (days > 55 && days <= 70) {
                const illiStrength = document.querySelector('input[name="illiStrength"]:checked');
                const fungicide = document.getElementById('fungicideCheck')?.checked;
                if (illiStrength) {
                    let strength = illiStrength.value;
                    if (strength === 'light') medicineText = "हल्की इल्ली के लिए: क्लोरपाइरीफॉस 20% EC (लार्सन) या साइपरमेथ्रिन 10% EC";
                    else if (strength === 'medium') medicineText = "मध्यम इल्ली के लिए: इमामेक्टिन बेंजोएट 5% SG (प्रोक्लेम)";
                    else if (strength === 'heavy') medicineText = "भारी इल्ली के लिए: क्लोरेंट्रानिलिप्रोल 18.5% SC (कोराजीन)";
                    if (fungicide) medicineText += " + फफूंदनाशक (जैसे टेबुकोनाजोल)";
                    medicineText += " + चिपको (सिलिकॉन)";
                } else {
                    medicineText = "कृपया इल्ली की तीव्रता चुनें।";
                }
            }
            else if (days > 70) {
                medicineText = "भारी इल्ली के लिए: क्लोरेंट्रानिलिप्रोल 18.5% SC (कोराजीन) + चिपको (सिलिकॉन)";
            }

            if (!medicineText) {
                medicineText = "कृपया सभी विकल्प चुनें।";
            }

            displayDiv.style.display = 'block';
            displayDiv.innerText = medicineText;
        }

        // Enter key से भी सर्च हो
        document.getElementById('smartSearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSmartSearch();
            }
        });
    </script>
