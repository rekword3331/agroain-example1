<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अकाउंट डेमो</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: calc(100% - 22px); /* Adjust for padding and border */
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #auth-status {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        #logout-btn {
            background-color: #dc3545;
            margin-top: 15px;
        }
        #logout-btn:hover {
            background-color: #c82333;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>अकाउंट प्रबंधन</h1>

        <div id="create-account-section">
            <h2>नया अकाउंट बनाएँ</h2>
            <div class="form-group">
                <label for="newUsername">यूज़रनेम:</label>
                <input type="text" id="newUsername" placeholder="नया यूज़रनेम दर्ज करें">
            </div>
            <div class="form-group">
                <label for="newPassword">पासवर्ड:</label>
                <input type="password" id="newPassword" placeholder="पासवर्ड दर्ज करें">
            </div>
            <button onclick="createAccount()">अकाउंट बनाएँ</button>
            <p style="margin-top: 15px;">या</p>
            <button onclick="showLogin()">लॉगिन करें</button>
            <div id="create-message" class="message hidden"></div>
        </div>

        <div id="login-section" class="hidden">
            <h2>लॉगिन करें</h2>
            <div class="form-group">
                <label for="loginUsername">यूज़रनेम:</label>
                <input type="text" id="loginUsername" placeholder="यूज़रनेम दर्ज करें">
            </div>
            <div class="form-group">
                <label for="loginPassword">पासवर्ड:</label>
                <input type="password" id="loginPassword" placeholder="पासवर्ड दर्ज करें">
            </div>
            <button onclick="login()">लॉगिन करें</button>
            <p style="margin-top: 15px;">या</p>
            <button onclick="showCreateAccount()">नया अकाउंट बनाएँ</button>
            <div id="login-message" class="message hidden"></div>
        </div>

        <div id="dashboard-section" class="hidden">
            <h2>स्वागत है, <span id="loggedInUsername"></span>!</h2>
            <p id="auth-status">आप लॉग इन हैं।</p>
            <button id="logout-btn" onclick="logout()">लॉग आउट</button>
        </div>
    </div>

    <script>
        const createAccotSection = document.getElementById('create-account-section');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loggedInUsernameSpan = document.getElementById('loggedInUsername');
        const createMessageDiv = document.getElementById('create-message');
        const loginMessageDiv = document.getElementById('login-message');

        // Check login status on page load
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('loggedInUser');
            if (currentUser) {
                showDashboard(currentUser);
            } else {
                showLogin(); // Default to login if not logged in
            }
        });

        function showSection(sectionToShow) {
            createAccountSection.classList.add('hidden');
            loginSection.classList.add('hidden');
            dashboardSection.classList.add('hidden');
            sectionToShow.classList.remove('hidden');
            // Clear messages when switching sections
            createMessageDiv.classList.add('hidden');
            loginMessageDiv.classList.add('hidden');
        }

        function showCreateAccount() {
            showSection(createAccountSection);
        }

        function showLogin() {
            showSection(loginSection);
        }

        function showDashboard(username) {
            loggedInUsernameSpan.textContent = username;
            showSection(dashboardSection);
        }

        function displayMessage(element, message, type) {
            element.textContent = message;
            element.className = `message ${type}`;
            element.classList.remove('hidden');
            setTimeout(() => {
                element.classList.add('hidden');
            }, 3000); // Hide message after 3 seconds
        }

        function createAccount() {
            const newUsername = document.getElementById('newUsername').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!newUsername || !newPassword) {
                displayMessage(createMessageDiv, 'कृपया यूज़रनेम और पासवर्ड दर्ज करें।', 'error');
                return;
            }

            // In a real app, you'd send this to a server
            // For demo, storing in localStorage
            const users = JSON.parse(localStorage.getItem('users')) || {};

            if (users[newUsername]) {
                displayMessage(createMessageDiv, 'यह यूज़रनेम पहले से मौजूद है।', 'error');
                return;
            }

            users[newUsername] = newPassword; // Store password directly (NOT SECURE IN REAL APP)
            localStorage.setItem('users', JSON.stringify(users));

            displayMessage(createMessageDiv, 'अकाउंट सफलतापूर्वक बनाया गया!', 'success');
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            setTimeout(showLogin, 1500); // Redirect to login after a short delay
        }

        function login() {
            const loginUsername = document.getElementById('loginUsername').value;
            const loginPassword = document.getElementById('loginPassword').value;

            if (!loginUsername || !loginPassword) {
                displayMessage(loginMessageDiv, 'कृपया यूज़रनेम और पासवर्ड दर्ज करें।', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users')) || {};

            if (users[loginUsername] && users[loginUsername] === loginPassword) {
                localStorage.setItem('loggedInUser', loginUsername); // Store logged-in user
                displayMessage(loginMessageDiv, 'सफलतापूर्वक लॉग इन किया गया!', 'success');
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                setTimeout(() => showDashboard(loginUsername), 1500); // Show dashboard
            } else {
                displayMessage(loginMessageDiv, 'गलत यूज़रनेम या पासवर्ड।', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('loggedInUser'); // Remove logged-in status
            displayMessage(dashboardSection, 'आप सफलतापूर्वक लॉग आउट हो गए हैं।', 'success');
            setTimeout(showLogin, 1500); // Redirect to login
        }
    </script>
</body>
</html>
