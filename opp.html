<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROAIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8em;
            color: #27ae60;
            margin-top: 0;
        }

        h2 {
            font-size: 2em;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 40px;
        }

        .option-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-selector button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .option-selector button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .option-selector button.active {
            background-color: #27ae60;
            box-shadow: 0 3px 8px rgba(39, 174, 96, 0.4);
        }

        .section {
            display: none;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fdfdfd;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .form-group input[type="number"],
        .form-group select {
            width: calc(100% - 22px);
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        .form-group select {
            appearance: none;
            background-color: white;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%204%205%22%3E%3Cpath%20fill%3D%22%23333%22%20d%3D%22M2%200L0%202h4zm0%205L0%203h4z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 12px;
        }

        .form-group input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .form-group button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .form-group button:hover {
            background-color: #218838;
        }

        .results {
            margin-top: 40px;
            padding: 20px;
            background-color: #e9f5ee;
            border-radius: 8px;
            border: 1px solid #d4edda;
        }

        .results h3 {
            color: #2c3e50;
            font-size: 1.6em;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-item {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .result-item p {
            margin: 8px 0;
            font-size: 1.05em;
        }

        .result-item p strong {
            color: #444;
        }

        .result-item .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .result-item .action-buttons button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s ease;
        }

        .result-item .action-buttons .cancel {
            background-color: #dc3545;
            color: white;
        }

        .result-item .action-buttons .cancel:hover {
            background-color: #c82333;
        }

        .result-item .action-buttons .undo {
            background-color: #ffc107;
            color: #333;
        }

        .result-item .action-buttons .undo:hover {
            background-color: #e0a800;
        }

        .total-payment {
            font-size: 1.8em;
            font-weight: bold;
            text-align: right;
            margin-top: 30px;
            color: #27ae60;
        }

        hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0));
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AGROAIN</h1>

        <div class="option-selector">
            <button id="insecticideBtn" class="active">Insecticide</button>
            <button id="herbicideBtn">Herbicide</button>
        </div>

        <div id="insecticideSection" class="section active">
            <h2>Insecticide Calculator</h2>
            <div class="form-group">
                <label for="insecticideBigha">Enter Bigha:</label>
                <input type="number" id="insecticideBigha" placeholder="e.g., 5" min="1">
            </div>
            <div class="form-group">
                <label for="insecticideProduct">Select Insecticide Product(s):</label>
                <select id="insecticideProduct" multiple size="4">
                    <option value="thiameethoxam+Lambda cyhalothrin9.5%zc">Thiameethoxam + Lambda Cyhalothrin 9.5% ZC</option>
                    <option value="Emamectin Benzoat 5%sg">Emamectin Benzoat 5% SG</option>
                    <option value="combo_thiameethoxam_emamectin">Thiameethoxam + Lambda Cyhalothrin 9.5% ZC + Emamectin Benzoat 5% SG (Combo)</option>
                    <option value="Chipko">Chipko</option>
                </select>
            </div>
            <div class="form-group">
                <button onclick="calculateInsecticide()">Calculate Insecticide</button>
            </div>
            <div id="insecticideResults" class="results">
                <h3>Calculation Results</h3>
                </div>
        </div>

        <div id="herbicideSection" class="section">
            <h2>Herbicide Calculator</h2>
            <div class="form-group">
                <label for="herbicideBigha">Enter Bigha:</label>
                <input type="number" id="herbicideBigha" placeholder="e.g., 5" min="1">
            </div>
            <div class="form-group">
                <label for="herbicideProduct">Select Herbicide Product(s):</label>
                <select id="herbicideProduct" multiple size="4">
                    <option value="Imizathayper10%SL">Imizathayper 10% SL</option>
                    <option value="IRIS">IRIS</option>
                    <option value="Centurion">Centurion</option>
                    <option value="Clobin">Clobin</option>
                </select>
            </div>
            <div class="form-group">
                <button onclick="calculateHerbicide()">Calculate Herbicide</button>
            </div>
            <div id="herbicideResults" class="results">
                <h3>Calculation Results</h3>
                </div>
        </div>
    </div>

    <script>
        // --- Product Data (Easily editable) ---
        const insecticideProducts = {
            "thiameethoxam+Lambda cyhalothrin9.5%zc": {
                name: "Thiameethoxam 12.6% + Lambda Cyhalothrin 9.5% ZC",
                usagePerBighaML: 65,
                packages: [
                    { size: "1 Liter", price: 1850, ml: 1000 },
                    { size: "500 ml", price: 950, ml: 500 },
                    { size: "250 ml", price: 320, ml: 250 }
                ]
            },
            "Emamectin Benzoat 5%sg": {
                name: "Emamectin Benzoat 5% SG",
                usagePerBighaGM: 75,
                packages: [
                    { size: "1 Kg", price: 1900, gm: 1000 },
                    { size: "500 Gm", price: 950, gm: 500 },
                    { size: "250 Gm", price: 480, gm: 250 }
                ]
            },
            "combo_thiameethoxam_emamectin": {
                name: "Thiameethoxam + Lambda Cyhalothrin 9.5% ZC + Emamectin Benzoat 5% SG (Combo)",
                usagePerBighaGM_each: 50, // 50gm of each
                // This is a special case, prices will be calculated from individual products
            },
            "Chipko": {
                name: "Chipko",
                usagePerBighaML: 15,
                packages: [
                    { size: "250 ml", price: 550, ml: 250 },
                    { size: "100 ml", price: 220, ml: 100 } // Assuming 100ml as the other option
                ],
                mandatory: true // Chipko is mandatory
            }
        };

        const herbicideProducts = {
            "Imizathayper10%SL": {
                name: "Imizathayper 10% SL",
                usagePerBighaML: 200,
                packages: [
                    { size: "1 Liter", price: 900, ml: 1000 },
                    { size: "500 ml", price: 450, ml: 500 }
                ]
            },
            "IRIS": {
                name: "IRIS",
                usagePerBighaML: 90,
                packages: [
                    { size: "800 ml", price: 1450, ml: 800 },
                    { size: "400 ml", price: 750, ml: 400 }
                ]
            },
            "Centurion": {
                name: "Centurion",
                usagePerBighaML_ ساتھ_Imizathayper: null, // Usage depends on Imizathayper
                packages: [
                    { size: "400 ml", price: 650, ml: 400 }
                ]
            },
            "Clobin": {
                name: "Clobin",
                usagePerBighaPack_साथ_Imizathayper: null, // Usage depends on Imizathayper
                packages: [
                    { size: "1 Pack", price: 140, units: 1 }
                ]
            }
        };

        // --- UI Logic ---
        const insecticideBtn = document.getElementById('insecticideBtn');
        const herbicideBtn = document.getElementById('herbicideBtn');
        const insecticideSection = document.getElementById('insecticideSection');
        const herbicideSection = document.getElementById('herbicideSection');

        insecticideBtn.addEventListener('click', () => {
            insecticideSection.classList.add('active');
            herbicideSection.classList.remove('active');
            insecticideBtn.classList.add('active');
            herbicideBtn.classList.remove('active');
            clearResults('insecticide');
        });

        herbicideBtn.addEventListener('click', () => {
            herbicideSection.classList.add('active');
            insecticideSection.classList.remove('active');
            insecticideBtn.classList.remove('active');
            herbicideBtn.classList.add('active');
            clearResults('herbicide');
        });

        function clearResults(type) {
            if (type === 'insecticide') {
                document.getElementById('insecticideResults').innerHTML = '<h3>Calculation Results</h3>';
            } else {
                document.getElementById('herbicideResults').innerHTML = '<h3>Calculation Results</h3>';
            }
        }

        // --- Calculation Functions ---

        function calculateInsecticide() {
            const bigha = parseFloat(document.getElementById('insecticideBigha').value);
            const selectedProducts = Array.from(document.getElementById('insecticideProduct').selectedOptions).map(option => option.value);
            const resultsDiv = document.getElementById('insecticideResults');
            resultsDiv.innerHTML = '<h3>Calculation Results</h3>'; // Clear previous results
            let overallTotalPayment = 0;

            if (isNaN(bigha) || bigha <= 0) {
                resultsDiv.innerHTML += '<p style="color: red;">Please enter a valid number of bigha.</p>';
                return;
            }

            // Add Chipko if not already selected, as it's mandatory
            if (!selectedProducts.includes("Chipko")) {
                selectedProducts.push("Chipko");
            }

            // Handle the special combo case first
            if (selectedProducts.includes("combo_thiameethoxam_emamectin")) {
                // If combo is selected, then individual thiameethoxam and emamectin are not considered separately for calculation
                const thiameethoxamInfo = insecticideProducts["thiameethoxam+Lambda cyhalothrin9.5%zc"];
                const emamectinInfo = insecticideProducts["Emamectin Benzoat 5%sg"];
                const comboInfo = insecticideProducts["combo_thiameethoxam_emamectin"];

                const requiredThiameethoxam = bigha * comboInfo.usagePerBighaGM_each; // 50gm per bigha
                const requiredEmamectin = bigha * comboInfo.usagePerBighaGM_each; // 50gm per bigha

                // Calculate package and price for Thiameethoxam
                let thiameethoxamTotalMl = requiredThiameethoxam;
                let thiameethoxamRecommendedPackage = "";
                let thiameethoxamTotalPayment = 0;

                // Simple package recommendation logic (can be made more sophisticated)
                if (thiameethoxamTotalMl <= thiameethoxamInfo.packages[2].ml) { // 250ml
                    thiameethoxamRecommendedPackage = `${thiameethoxamInfo.packages[2].size}`;
                    thiameethoxamTotalPayment = thiameethoxamInfo.packages[2].price;
                } else if (thiameethoxamTotalMl <= thiameethoxamInfo.packages[1].ml) { // 500ml
                    thiameethoxamRecommendedPackage = `${thiameethoxamInfo.packages[1].size}`;
                    thiameethoxamTotalPayment = thiameethoxamInfo.packages[1].price;
                } else {
                    const numLiters = Math.ceil(thiameethoxamTotalMl / thiameethoxamInfo.packages[0].ml);
                    thiameethoxamRecommendedPackage = `${numLiters} x ${thiameethoxamInfo.packages[0].size}`;
                    thiameethoxamTotalPayment = numLiters * thiameethoxamInfo.packages[0].price;
                }

                overallTotalPayment += thiameethoxamTotalPayment;

                resultsDiv.innerHTML += `
                    <div class="result-item">
                        <p><strong>Dawai Name:</strong> ${thiameethoxamInfo.name} (Part of Combo)</p>
                        <p><strong>Total Dawai Needed:</strong> ${thiameethoxamTotalMl.toFixed(2)} ml</p>
                        <p><strong>Recommended Package:</strong> ${thiameethoxamRecommendedPackage}</p>
                        <p><strong>Use per Bigha:</strong> ${comboInfo.usagePerBighaGM_each} ml</p>
                        <p><strong>Total Payment:</strong> ₹ ${thiameethoxamTotalPayment.toFixed(2)}</p>
                        <div class="action-buttons">
                            <button class="cancel">Cancel</button>
                            <button class="undo">Undo</button>
                        </div>
                    </div>
                `;

                // Calculate package and price for Emamectin
                let emamectinTotalGm = requiredEmamectin;
                let emamectinRecommendedPackage = "";
                let emamectinTotalPayment = 0;

                if (emamectinTotalGm <= emamectinInfo.packages[2].gm) { // 250gm
                    emamectinRecommendedPackage = `${emamectinInfo.packages[2].size}`;
                    emamectinTotalPayment = emamectinInfo.packages[2].price;
                } else if (emamectinTotalGm <= emamectinInfo.packages[1].gm) { // 500gm
                    emamectinRecommendedPackage = `${emamectinInfo.packages[1].size}`;
                    emamectinTotalPayment = emamectinInfo.packages[1].price;
                } else {
                    const numKgs = Math.ceil(emamectinTotalGm / emamectinInfo.packages[0].gm);
                    emamectinRecommendedPackage = `${numKgs} x ${emamectinInfo.packages[0].size}`;
                    emamectinTotalPayment = numKgs * emamectinInfo.packages[0].price;
                }

                overallTotalPayment += emamectinTotalPayment;

                resultsDiv.innerHTML += `
                    <div class="result-item">
                        <p><strong>Dawai Name:</strong> ${emamectinInfo.name} (Part of Combo)</p>
                        <p><strong>Total Dawai Needed:</strong> ${emamectinTotalGm.toFixed(2)} gm</p>
                        <p><strong>Recommended Package:</strong> ${emamectinRecommendedPackage}</p>
                        <p><strong>Use per Bigha:</strong> ${comboInfo.usagePerBighaGM_each} gm</p>
                        <p><strong>Total Payment:</strong> ₹ ${emamectinTotalPayment.toFixed(2)}</p>
                        <div class="action-buttons">
                            <button class="cancel">Cancel</button>
                            <button class="undo">Undo</button>
                        </div>
                    </div>
                `;

                // Remove individual thiameethoxam and emamectin from selection to avoid duplicate calculations
                selectedProducts.splice(selectedProducts.indexOf("thiameethoxam+Lambda cyhalothrin9.5%zc"), 1);
                selectedProducts.splice(selectedProducts.indexOf("Emamectin Benzoat 5%sg"), 1);
                selectedProducts.splice(selectedProducts.indexOf("combo_thiameethoxam_emamectin"), 1); // Remove combo itself
            }

            selectedProducts.forEach(productKey => {
                const product = insecticideProducts[productKey];
                if (!product) return; // Skip if product not found

                let totalNeeded;
                let recommendedPackage = "";
                let totalPayment = 0;
                let unit = "";
                let usagePerBigha = 0;

                if (productKey === "thiameethoxam+Lambda cyhalothrin9.5%zc") {
                    totalNeeded = bigha * product.usagePerBighaML;
                    unit = "ml";
                    usagePerBigha = product.usagePerBighaML;

                    let remainingMl = totalNeeded;
                    let packagesCount = {};

                    // Prioritize larger packages
                    for (let i = 0; i < product.packages.length; i++) {
                        const pkg = product.packages[i];
                        const numPkgs = Math.floor(remainingMl / pkg.ml);
                        if (numPkgs > 0) {
                            packagesCount[pkg.size] = numPkgs;
                            totalPayment += numPkgs * pkg.price;
                            remainingMl -= numPkgs * pkg.ml;
                        }
                    }

                    // If there's still a remainder, get the smallest package that covers it
                    if (remainingMl > 0) {
                        const smallestPkg = product.packages[product.packages.length - 1]; // 250ml
                        if (remainingMl <= smallestPkg.ml) {
                            packagesCount[smallestPkg.size] = (packagesCount[smallestPkg.size] || 0) + 1;
                            totalPayment += smallestPkg.price;
                        } else {
                             // If remainder is still larger than smallest package, but smaller than the next one up, then use next one up
                            for (let i = product.packages.length - 2; i >= 0; i--) {
                                if (remainingMl <= product.packages[i].ml) {
                                    packagesCount[product.packages[i].size] = (packagesCount[product.packages[i].size] || 0) + 1;
                                    totalPayment += product.packages[i].price;
                                    break;
                                }
                            }
                        }
                    }

                    recommendedPackage = Object.keys(packagesCount).map(size => `${packagesCount[size]} x ${size}`).join(', ');

                } else if (productKey === "Emamectin Benzoat 5%sg") {
                    totalNeeded = bigha * product.usagePerBighaGM;
                    unit = "gm";
                    usagePerBigha = product.usagePerBighaGM;

                    let remainingGm = totalNeeded;
                    let packagesCount = {};

                    for (let i = 0; i < product.packages.length; i++) {
                        const pkg = product.packages[i];
                        const numPkgs = Math.floor(remainingGm / pkg.gm);
                        if (numPkgs > 0) {
                            packagesCount[pkg.size] = numPkgs;
                            totalPayment += numPkgs * pkg.price;
                            remainingGm -= numPkgs * pkg.gm;
                        }
                    }

                    if (remainingGm > 0) {
                        const smallestPkg = product.packages[product.packages.length - 1]; // 250gm
                        if (remainingGm <= smallestPkg.gm) {
                            packagesCount[smallestPkg.size] = (packagesCount[smallestPkg.size] || 0) + 1;
                            totalPayment += smallestPkg.price;
                        } else {
                            for (let i = product.packages.length - 2; i >= 0; i--) {
                                if (remainingGm <= product.packages[i].gm) {
                                    packagesCount[product.packages[i].size] = (packagesCount[product.packages[i].size] || 0) + 1;
                                    totalPayment += product.packages[i].price;
                                    break;
                                }
                            }
                        }
                    }

                    recommendedPackage = Object.keys(packagesCount).map(size => `${packagesCount[size]} x ${size}`).join(', ');

                } else if (productKey === "Chipko") {
                    totalNeeded = bigha * product.usagePerBighaML;
                    unit = "ml";
                    usagePerBigha = product.usagePerBighaML;

                    let remainingMl = totalNeeded;
                    let packagesCount = {};

                    for (let i = 0; i < product.packages.length; i++) {
                        const pkg = product.packages[i];
                        const numPkgs = Math.floor(remainingMl / pkg.ml);
                        if (numPkgs > 0) {
                            packagesCount[pkg.size] = numPkgs;
                            totalPayment += numPkgs * pkg.price;
                            remainingMl -= numPkgs * pkg.ml;
                        }
                    }
                     if (remainingMl > 0) {
                        const smallestPkg = product.packages[product.packages.length - 1];
                        if (remainingMl <= smallestPkg.ml) {
                            packagesCount[smallestPkg.size] = (packagesCount[smallestPkg.size] || 0) + 1;
                            totalPayment += smallestPkg.price;
                        } else {
                            for (let i = product.packages.length - 2; i >= 0; i--) {
                                if (remainingMl <= product.packages[i].ml) {
                                    packagesCount[product.packages[i].size] = (packagesCount[product.packages[i].size] || 0) + 1;
                                    totalPayment += product.packages[i].price;
                                    break;
                                }
                            }
                        }
                    }

                    recommendedPackage = Object.keys(packagesCount).map(size => `${packagesCount[size]} x ${size}`).join(', ');
                }

                if (totalNeeded !== undefined) {
                    overallTotalPayment += totalPayment;

                    resultsDiv.innerHTML += `
                        <div class="result-item">
                            <p><strong>Dawai Name:</strong> ${product.name}</p>
                            <p><strong>Total Dawai Needed:</strong> ${totalNeeded.toFixed(2)} ${unit}</p>
                            <p><strong>Recommended Package:</strong> ${recommendedPackage || 'N/A'}</p>
                            <p><strong>Use per Bigha:</strong> ${usagePerBigha} ${unit}</p>
                            <p><strong>Total Payment:</strong> ₹ ${totalPayment.toFixed(2)}</p>
                            <div class="action-buttons">
                                <button class="cancel" onclick="cancelItem(this, ${totalPayment})">Cancel</button>
                                <button class="undo" onclick="undoItem(this, ${totalPayment})" style="display:none;">Undo</button>
                            </div>
                        </div>
                    `;
                }
            });

            resultsDiv.innerHTML += `<p class="total-payment"><strong>All Payment:</strong> ₹ ${overallTotalPayment.toFixed(2)}</p>`;
        }

        function calculateHerbicide() {
            const bigha = parseFloat(document.getElementById('herbicideBigha').value);
            const selectedProducts = Array.from(document.getElementById('herbicideProduct').selectedOptions).map(option => option.value);
            const resultsDiv = document.getElementById('herbicideResults');
            resultsDiv.innerHTML = '<h3>Calculation Results</h3>'; // Clear previous results
            let overallTotalPayment = 0;

            if (isNaN(bigha) || bigha <= 0) {
                resultsDiv.innerHTML += '<p style="color: red;">Please enter a valid number of bigha.</p>';
                return;
            }

            const isImizathayperSelected = selectedProducts.includes("Imizathayper10%SL");
            const isIRISSelected = selectedProducts.includes("IRIS");
            const isCenturionSelected = selectedProducts.includes("Centurion");
            const isClobinSelected = selectedProducts.includes("Clobin");

            let imizathayperUsage = herbicideProducts["Imizathayper10%SL"].usagePerBighaML;

            if (isImizathayperSelected && isIRISSelected && isCenturionSelected && isClobinSelected) {
                imizathayperUsage = 160; // Special case for Imizathayper when all 4 are selected
            }

            selectedProducts.forEach(productKey => {
                const product = herbicideProducts[productKey];
                if (!product) return;

                let totalNeeded;
                let recommendedPackage = "";
                let totalPayment = 0;
                let unit = "";
                let usagePerBigha = 0;

                if (productKey === "Imizathayper10%SL") {
                    totalNeeded = bigha * imizathayperUsage;
                    unit = "ml";
                    usagePerBigha = imizathayperUsage;

                    let remainingMl = totalNeeded;
                    let packagesCount = {};

                    for (let i = 0; i < product.packages.length; i++) {
                        const pkg = product.packages[i];
                        const numPkgs = Math.floor(remainingMl / pkg.ml);
                        if (numPkgs > 0) {
                            packagesCount[pkg.size] = numPkgs;
                            totalPayment += numPkgs * pkg.price;
                            remainingMl -= numPkgs * pkg.ml;
                        }
                    }

                    if (remainingMl > 0) {
                        const smallestPkg = product.packages[product.packages.length - 1];
                        if (remainingMl <= smallestPkg.ml) {
                            packagesCount[smallestPkg.size] = (packagesCount[smallestPkg.size] || 0) + 1;
                            totalPayment += smallestPkg.price;
                        } else {
                            for (let i = product.packages.length - 2; i >= 0; i--) {
                                if (remainingMl <= product.packages[i].ml) {
                                    packagesCount[product.packages[i].size] = (packagesCount[product.packages[i].size] || 0) + 1;
                                    totalPayment += product.packages[i].price;
                                    break;
                                }
                            }
                        }
                    }

                    recommendedPackage = Object.keys(packagesCount).map(size => `${packagesCount[size]} x ${size}`).join(', ');

                } else if (productKey === "IRIS") {
                    totalNeeded = bigha * product.usagePerBighaML;
                    unit = "ml";
                    usagePerBigha = product.usagePerBighaML;

                    let remainingMl = totalNeeded;
                    let packagesCount = {};

                    for (let i = 0; i < product.packages.length; i++) {
                        const pkg = product.packages[i];
                        const numPkgs = Math.floor(remainingMl / pkg.ml);
                        if (numPkgs > 0) {
                            packagesCount[pkg.size] = numPkgs;
                            totalPayment += numPkgs * pkg.price;
                            remainingMl -= numPkgs * pkg.ml;
                        }
                    }

                    if (remainingMl > 0) {
                        const smallestPkg = product.packages[product.packages.length - 1];
                        if (remainingMl <= smallestPkg.ml) {
                            packagesCount[smallestPkg.size] = (packagesCount[smallestPkg.size] || 0) + 1;
                            totalPayment += smallestPkg.price;
                        } else {
                            for (let i = product.packages.length - 2; i >= 0; i--) {
                                if (remainingMl <= product.packages[i].ml) {
                                    packagesCount[product.packages[i].size] = (packagesCount[product.packages[i].size] || 0) + 1;
                                    totalPayment += product.packages[i].price;
                                    break;
                                }
                            }
                        }
                    }

                    recommendedPackage = Object.keys(packagesCount).map(size => `${packagesCount[size]} x ${size}`).join(', ');

                } else if (productKey === "Centurion") {
                    if (isImizathayperSelected) {
                        totalNeeded = bigha; // 1 Centurion per bigha (when used with Imazethapyr)
                        unit = "pack/bigha";
                        usagePerBigha = "1 pack with Imizathayper";
                        totalPayment = bigha * product.packages[0].price; // 400ml is one pack
                        recommendedPackage = `${bigha} x ${product.packages[0].size}`;
                    } else {
                        // Skip if Imizathayper is not selected for Centurion
                        return;
                    }
                } else if (productKey === "Clobin") {
                    if (isImizathayperSelected) {
                        totalNeeded = bigha; // 1 Clobin per bigha (when used with Imazethapyr)
                        unit = "pack/bigha";
                        usagePerBigha = "1 pack with Imizathayper";
                        totalPayment = bigha * product.packages[0].price; // 1 pack
                        recommendedPackage = `${bigha} x ${product.packages[0].size}`;
                    } else {
                        // Skip if Imizathayper is not selected for Clobin
                        return;
                    }
                }

                if (totalNeeded !== undefined) {
                    overallTotalPayment += totalPayment;

                    resultsDiv.innerHTML += `
                        <div class="result-item">
                            <p><strong>Dawai Name:</strong> ${product.name}</p>
                            <p><strong>Total Dawai Needed:</strong> ${totalNeeded.toFixed(2)} ${unit}</p>
                            <p><strong>Recommended Package:</strong> ${recommendedPackage || 'N/A'}</p>
                            <p><strong>Use per Bigha:</strong> ${usagePerBigha} ${unit}</p>
                            <p><strong>Total Payment:</strong> ₹ ${totalPayment.toFixed(2)}</p>
                            <div class="action-buttons">
                                <button class="cancel" onclick="cancelItem(this, ${totalPayment})">Cancel</button>
                                <button class="undo" onclick="undoItem(this, ${totalPayment})" style="display:none;">Undo</button>
                            </div>
                        </div>
                    `;
                }
            });

            resultsDiv.innerHTML += `<p class="total-payment"><strong>All Payment:</strong> ₹ ${overallTotalPayment.toFixed(2)}</p>`;
        }


        let currentOverallPayment = 0; // To keep track of total payment for cancel/undo

        function updateOverallPayment(amount) {
            const totalPaymentElement = document.querySelector('.results .total-payment strong');
            if (totalPaymentElement) {
                currentOverallPayment += amount;
                totalPaymentElement.textContent = `₹ ${currentOverallPayment.toFixed(2)}`;
            }
        }

        function cancelItem(button, itemPrice) {
            const itemDiv = button.closest('.result-item');
            itemDiv.style.textDecoration = 'line-through';
            itemDiv.style.opacity = '0.6';
            button.style.display = 'none';
            itemDiv.querySelector('.undo').style.display = 'inline-block';
            updateOverallPayment(-itemPrice);
        }

        function undoItem(button, itemPrice) {
            const itemDiv = button.closest('.result-item');
            itemDiv.style.textDecoration = 'none';
            itemDiv.style.opacity = '1';
            button.style.display = 'none';
            itemDiv.querySelector('.cancel').style.display = 'inline-block';
            updateOverallPayment(itemPrice);
        }

        // Initialize total payment when a calculation happens
        const originalCalculateInsecticide = calculateInsecticide;
        calculateInsecticide = function() {
            originalCalculateInsecticide();
            const totalPaymentElement = document.querySelector('#insecticideResults .total-payment strong');
            if (totalPaymentElement) {
                currentOverallPayment = parseFloat(totalPaymentElement.textContent.replace('₹ ', ''));
            } else {
                currentOverallPayment = 0;
            }
        };

        const originalCalculateHerbicide = calculateHerbicide;
        calculateHerbicide = function() {
            originalCalculateHerbicide();
            const totalPaymentElement = document.querySelector('#herbicideResults .total-payment strong');
            if (totalPaymentElement) {
                currentOverallPayment = parseFloat(totalPaymentElement.textContent.replace('₹ ', ''));
            } else {
                currentOverallPayment = 0;
            }
        };

        // Initial setup to show insecticide by default
        document.addEventListener('DOMContentLoaded', () => {
            insecticideBtn.click();
        });

    </script>
</body>
</html>
