<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Agroain · फसल चुनें</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #8bc34a; --dark: #1b5e20; --light: #f1f8e9; --accent: #ff9800; --danger: #d32f2f; --info: #0288d1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f4; margin: 0; padding: 10px; }
        
        /* Loader */
        .page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 2000; transition: 0.5s; }
        .page-loader.hidden { opacity: 0; visibility: hidden; }
        .page-spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* नया हेडर जिसमें टाइटल + ड्रॉपडाउन दोनों होंगे */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .header h1 {
            margin: 0;
            color: var(--dark);
            font-size: 1.8rem;
        }
        .header .crop-selector {
            min-width: 160px;
        }
        .header select {
            padding: 8px 12px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            background-color: var(--light);
            font-weight: bold;
            color: var(--dark);
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        .subtitle {
            text-align: center;
            color: #555;
            margin-top: 5px;
            font-size: 0.9rem;
            width: 100%;
        }
        
        .section { border: 1px solid #ddd; padding: 15px; border-radius: 12px; background: #fafafa; margin-bottom: 15px; }
        input, button, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; width: 100%; box-sizing: border-box; background: white; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
        
        .radio-group { display: flex; gap: 20px; margin: 15px 0; align-items: center; }
        .radio-group label { display: flex; align-items: center; gap: 5px; font-weight: 500; }
        .radio-group input[type="radio"] { width: auto; margin-right: 5px; accent-color: var(--primary); }

        .hidden { display: none; }
        .option-buttons { display: flex; gap: 10px; margin: 10px 0; }
        .option-btn { background: #e8f5e9; color: #1b5e20; border: 2px solid #c8e6c9; padding: 10px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; flex: 1; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--dark); }

        #result { display: none; margin-top: 20px; }
        .success-box { background: var(--light); padding: 15px; border-radius: 10px; border: 1px solid var(--secondary); margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .alert-info { background: #e3f2fd; border-left: 5px solid var(--info); padding: 10px; color: var(--info); font-weight: bold; margin-top: 10px; border-radius: 5px; }
        .med-card { background: #fff; border: 1px solid #c8e6c9; border-radius: 10px; padding: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="page-loader" id="pageLoader"><div class="page-spinner"></div></div>

    <div class="container">
        <!-- नया हेडर: टाइटल बाईं ओर, फसल ड्रॉपडाउन दाईं ओर -->
        <div class="header">
            <h1>Agroain</h1>
            <div class="crop-selector">
                <select id="cropSelect">
                    <option value="सोयाबीन">सोयाबीन</option>
                    <option value="मक्का">मक्का</option>
                    <option value="गेहूं">गेहूं</option>
                    <option value="लहसुन">लहसुन</option>
                    <option value="प्याज">प्याज</option>
                    <option value="आलू">आलू</option>
                    <option value="धान">धान (चावल)</option>
                    <option value="गन्ना">गन्ना</option>
                    <option value="कपास">कपास</option>
                    <option value="मूंगफली">मूंगफली</option>
                    <option value="सरसों">सरसों</option>
                    <option value="चना">चना</option>
                    <option value="मटर">मटर</option>
                    <option value="मसूर">मसूर (दाल)</option>
                    <option value="जौ">जौ</option>
                    <option value="ज्वार">ज्वार</option>
                    <option value="बाजरा">बाजरा</option>
                    <option value="तिल">तिल</option>
                    <option value="सूरजमुखी">सूरजमुखी</option>
                    <option value="अरहर">अरहर (तुअर)</option>
                </select>
            </div>
            <div class="subtitle">स्मार्ट सुरक्षा · डेटाबेस संचालित</div>
        </div>

        <div class="section">
            <label>🧾 आपकी जमीन कितने बीघा है?</label>
            <div style="margin-bottom: 15px;">
                <select id="bigha">
                    <option value="1" selected>1 बीघा</option>
                    <option value="2">2 बीघा</option>
                    <option value="3">3 बीघा</option>
                    <option value="4">4 बीघा</option>
                    <option value="5">5 बीघा</option>
                    <option value="6">6 बीघा</option>
                    <option value="8">8 बीघा</option>
                    <option value="10">10 बीघा</option>
                    <option value="12">12 बीघा</option>
                    <option value="15">15 बीघा</option>
                    <option value="18">18 बीघा</option>
                    <option value="20">20 बीघा</option>
                    <option value="25">25 बीघा</option>
                    <option value="30">30 बीघा</option>
                    <option value="35">35 बीघा</option>
                    <option value="40">40 बीघा</option>
                    <option value="45">45 बीघा</option>
                    <option value="50">50 बीघा</option>
                </select>
            </div>

            <label>🌱 क्या आपने अपनी फसल की बुवाई कर दी है?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="buwai" value="yes" checked onchange="toggleBuwaiOptions()"> हाँ
                </label>
                <label>
                    <input type="radio" name="buwai" value="no" onchange="toggleBuwaiOptions()"> नहीं
                </label>
            </div>

            <!-- यदि हाँ चुना तो दिन वाला सर्च दिखेगा -->
            <div id="yesContainer">
                <label>📅 फसल कितने दिन की है? (दिन संख्या डालें)</label>
                <input type="number" id="dayInput" placeholder="उदा. 15, 25, 60" min="0">
            </div>

            <!-- यदि नहीं चुना तो यह विकल्प दिखेंगे -->
            <div id="noContainer" class="hidden">
                <label>🧴 कृपया चुनें:</label>
                <div class="option-buttons">
                    <div id="seedTreatmentBtn" class="option-btn selected" onclick="selectPreOption('seed')">🌾 बीज उपचार</div>
                    <div id="preSowingBtn" class="option-btn" onclick="selectPreOption('presowing')">🧪 बुवाई से पहले की दवाई (खेत)</div>
                </div>
                <input type="hidden" id="selectedPreOption" value="seed">
            </div>

            <button onclick="handleSmartSearch()">दवाई और स्टेज देखें</button>
        </div>

        <div id="result">
            <h3 id="resTitle">🔍 परिणाम</h3>
            <div id="resContent"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            databaseURL: "https://agroain-default-rtdb.firebaseio.com/", // 👈 आपका Database URL
            projectId: "agroain-default-rtdb",
        };
        firebase.initializeApp(firebaseConfig);
        const rdb = firebase.database();   // Realtime DB (Stages)
        const db = firebase.firestore();   // Firestore (Products)

        window.onload = () => {
            setTimeout(() => document.getElementById('pageLoader').classList.add('hidden'), 1000);
            toggleBuwaiOptions();
        };

        // फसल चयन को ट्रैक करने के लिए (वैकल्पिक)
        document.getElementById('cropSelect').addEventListener('change', function() {
            console.log('चुनी गई फसल:', this.value);
            // आप चाहें तो यहाँ और कार्य कर सकते हैं
        });

        function toggleBuwaiOptions() {
            const yesRadio = document.querySelector('input[name="buwai"][value="yes"]');
            const noRadio = document.querySelector('input[name="buwai"][value="no"]');
            const yesContainer = document.getElementById('yesContainer');
            const noContainer = document.getElementById('noContainer');

            if (yesRadio.checked) {
                yesContainer.classList.remove('hidden');
                noContainer.classList.add('hidden');
            } else {
                yesContainer.classList.add('hidden');
                noContainer.classList.remove('hidden');
            }
        }

        function selectPreOption(option) {
            const seedBtn = document.getElementById('seedTreatmentBtn');
            const preBtn = document.getElementById('preSowingBtn');
            const hiddenInput = document.getElementById('selectedPreOption');

            if (option === 'seed') {
                seedBtn.classList.add('selected');
                preBtn.classList.remove('selected');
                hiddenInput.value = 'seed';
            } else {
                seedBtn.classList.remove('selected');
                preBtn.classList.add('selected');
                hiddenInput.value = 'presowing';
            }
        }

        async function handleSmartSearch() {
            const yesRadio = document.querySelector('input[name="buwai"][value="yes"]');
            const isBuwaiHaan = yesRadio.checked;
            const bigha = parseFloat(document.getElementById('bigha').value) || 1;
            const selectedCrop = document.getElementById('cropSelect').value; // चुनी गई फसल

            const res = document.getElementById('result');
            const content = document.getElementById('resContent');
            const title = document.getElementById('resTitle');

            res.style.display = "block";
            content.innerHTML = "खोज रहे हैं...";

            if (isBuwaiHaan) {
                const day = document.getElementById('dayInput').value.trim();
                if (!day) {
                    content.innerHTML = "कृपया दिन संख्या डालें।";
                    return;
                }
                if (isNaN(day)) {
                    content.innerHTML = "केवल संख्या डालें (जैसे 15)";
                    return;
                }
                title.innerText = `फसल अवस्था: ${day} दिन (${selectedCrop})`;

                rdb.ref('crop_stages').once('value', (snapshot) => {
                    let found = false;
                    content.innerHTML = "";

                    snapshot.forEach((child) => {
                        const stage = child.val();
                        if (parseInt(day) >= stage.start && parseInt(day) <= stage.end) {
                            content.innerHTML += `
                                <div class="success-box">
                                    <h3 style="margin-top:0">${stage.title}</h3>
                                    <p>${stage.msg}</p>
                                    ${stage.alert ? `<div class="alert-info">⚠️ ${stage.alert}</div>` : ''}
                                </div>
                            `;
                            found = true;
                        }
                    });

                    if (!found) {
                        content.innerHTML = `<div class="success-box">😕 इस दिन के लिए डेटाबेस में कोई विशेष सलाह नहीं मिली।</div>`;
                    }
                });

            } else {
                const selectedOption = document.getElementById('selectedPreOption').value;
                let category = "";
                let displayTitle = "";

                if (selectedOption === 'seed') {
                    category = "seed_treatment";
                    displayTitle = `बीज उपचार (${selectedCrop})`;
                } else {
                    category = "pre_sowing";
                    displayTitle = `बुवाई पूर्व दवाएँ (${selectedCrop})`;
                }

                title.innerText = displayTitle;

                try {
                    const snapshot = await db.collection('products')
                        .where('category', '==', category)
                        .get();

                    if (snapshot.empty) {
                        content.innerHTML = getDummyProducts(selectedOption, selectedCrop);
                    } else {
                        content.innerHTML = "";
                        snapshot.forEach(doc => {
                            const p = doc.data();
                            content.innerHTML += `
                                <div class="med-card">
                                    <strong style="color:var(--primary)">🌿 ${p.name}</strong><br>
                                    <span>🧪 टेक्निकल: ${p.technical || '-'}</span><br>
                                    <span>📦 स्टॉक: ${(p.stock > 0) ? '✅ उपलब्ध' : '❌ खत्म'}</span>
                                </div>
                            `;
                        });
                    }
                } catch (e) {
                    console.error(e);
                    content.innerHTML = getDummyProducts(selectedOption, selectedCrop);
                }
            }
        }

        function getDummyProducts(option, crop) {
            if (option === 'seed') {
                return `
                    <div class="med-card"><strong>🌿 ट्राइकोडर्मा (${crop})</strong><br>🧪 बायो-फंगीसाइड<br>📦 स्टॉक: ✅ उपलब्ध</div>
                    <div class="med-card"><strong>🌿 कार्बेन्डाजिम (${crop})</strong><br>🧪 50% WP<br>📦 स्टॉक: ✅ उपलब्ध</div>
                    <div class="med-card"><strong>🌿 राइजोबियम कल्चर (${crop})</strong><br>🧪 जैविक उपचार<br>📦 स्टॉक: ✅ उपलब्ध</div>
                `;
            } else {
                return `
                    <div class="med-card"><strong>🌿 क्लोरपायरीफॉस (${crop})</strong><br>🧪 20% EC (मिट्टी उपचार)<br>📦 स्टॉक: ✅ उपलब्ध</div>
                    <div class="med-card"><strong>🌿 फोरेट 10G (${crop})</strong><br>🧪 कीटनाशक दाना<br>📦 स्टॉक: ✅ उपलब्ध</div>
                    <div class="med-card"><strong>🌿 ट्राइकोडर्मा विरिडी (${crop})</strong><br>🧪 जैविक फफूंदनाशक<br>📦 स्टॉक: ✅ उपलब्ध</div>
                `;
            }
        }
    </script>
</body>
</html>
