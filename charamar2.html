<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROAIN</title>
    <style>
        /* --- CSS Styling --- */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input[type="number"] {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background-color: #45a049;
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9ffe9;
            border: 1px solid #d4ffd4;
            border-radius: 6px;
            text-align: left;
            display: none;
        }

        .results .pesticide-section {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dotted #ccc;
        }
        .results .pesticide-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .results p {
            margin: 8px 0;
            font-size: 17px;
            color: #333;
        }

        .results strong {
            color: #2e8b57;
        }

        .total-summary {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            color: #1a5a3a;
            border-top: 2px solid #4CAF50;
            padding-top: 15px;
        }
        .error {
            color: red;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Styles for package selection */
        .package-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px; /* Added for spacing */
        }
        .package-options label {
            background-color: #f0f0f0;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            display: flex;
            align-items: center;
            font-weight: normal;
        }
        .package-options input[type="radio"] {
            margin-right: 5px;
            transform: scale(1.2);
        }
        .package-options label:hover {
            background-color: #e0e0e0;
        }
        .package-options input[type="radio"]:checked + span {
            font-weight: bold;
            color: #4CAF50;
        }

        /* Styles for Cancel/Undo buttons */
        .action-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: flex-end; /* Align to the right */
        }
        .action-buttons button {
            padding: 8px 15px;
            font-size: 14px;
            margin-top: 0; /* Override default button margin */
        }
        .cancel-btn {
            background-color: #dc3545; /* Red */
        }
        .cancel-btn:hover {
            background-color: #c82333;
        }
        .undo-btn {
            background-color: #007bff; /* Blue */
            display: none; /* Hidden by default */
        }
        .undo-btn:hover {
            background-color: #0056b3;
        }

        /* Style for cancelled state */
        .pesticide-section.cancelled {
            opacity: 0.6;
            background-color: #ffe0e0; /* Light red background */
        }
        .pesticide-section.cancelled .action-buttons .cancel-btn {
            display: none;
        }
        .pesticide-section.cancelled .action-buttons .undo-btn {
            display: inline-block;
        }
        .pesticide-section.cancelled .package-options input[type="radio"] {
            pointer-events: none; /* Disable radio buttons when cancelled */
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AGROAIN</h1>

        <div class="input-group">
            <label for="biga">Enter Biga:</label>
            <input type="number" id="biga" min="0" placeholder="e.g., 1, 2.5">
        </div>
        
        <button id="submitBtn">Submit</button>

        <div id="results" class="results">
            </div>
    </div>

    <script>
        /* --- JavaScript Logic --- */
        document.addEventListener('DOMContentLoaded', () => {
            const bigaInput = document.getElementById('biga');
            const submitBtn = document.getElementById('submitBtn');
            const resultsDiv = document.getElementById('results');

            // Store current calculated state to allow undo
            let currentPesticideStates = {}; // { pesticideKey: { amountNeeded, selectedPackSize, selectedPackPrice, isCancelled } }

            // Define pesticide data including rates and prices
            const pesticidesData = {
                imizathayper: {
                    name: "Imizathayper 10% SL",
                    ratePerBiga: 200, // ml per biga (default, not used in this scenario)
                    ratePerBigaCombined: 160, // ml per biga when all 4 are selected
                    unit: "ml",
                    packs: [
                        { size: 1000, price: 900 }, // 1 Liter
                        { size: 500, price: 450 }
                    ]
                },
                iris: {
                    name: "IRIS",
                    ratePerBiga: 90, // ml per biga
                    unit: "ml",
                    packs: [
                        { size: 800, price: 1450 },
                        { size: 400, price: 750 }
                    ]
                },
                centurion: {
                    name: "Centurion",
                    fixedQuantityPerImizathayperPack: 400, // ml
                    unit: "ml",
                    pricePerPack: 650 // for 400ml pack
                },
                clobin: {
                    name: "Clobin",
                    fixedPacksPerImizathayperPack: 1, // 1 pack
                    unit: "pack",
                    pricePerPack: 140 // per pack
                }
            };

            submitBtn.addEventListener('click', calculatePesticides);

            /**
             * Generates HTML for package options and handles user selection.
             * @param {string} pesticideKey The key for the pesticide (e.g., 'imizathayper').
             * @param {Array<Object>} packs An array of pack objects {size, price}.
             * @param {string} unit The unit of measurement (ml, gm, pack).
             * @param {number} defaultPackSize The size of the pack to be initially selected.
             * @returns {string} HTML string for package options.
             */
            const generatePackOptionsHTML = (pesticideKey, packs, unit, defaultPackSize) => {
                let optionsHTML = `<div class="package-options" data-pesticide="${pesticideKey}">`;
                packs.forEach((pack) => {
                    const isChecked = pack.size === defaultPackSize ? 'checked' : '';
                    optionsHTML += `
                        <label>
                            <input type="radio" name="pack-${pesticideKey}" value="${pack.size}" data-price="${pack.price}" ${isChecked}>
                            <span>${pack.size}${unit} (₹${pack.price})</span>
                        </label>
                    `;
                });
                optionsHTML += `</div>`;
                return optionsHTML;
            };

            /**
             * Calculates the cost and recommended packs for a specific amount based on a chosen single pack size.
             * @param {number} neededAmount The total amount required.
             * @param {number} selectedPackSize The size of the pack selected by the user.
             * @param {number} selectedPackPrice The price of the pack selected by the user.
             * @param {string} unit The unit for display (e.g., 'ml', 'gm').
             * @returns {Object} { recommendedPacks: string, cost: number, count: number }
             */
            const getCostForSelectedPack = (neededAmount, selectedPackSize, selectedPackPrice, unit) => {
                if (neededAmount === 0 || selectedPackSize === 0 || selectedPackPrice === 0) {
                    return { recommendedPacks: "0 packs needed.", cost: 0, count: 0 };
                }

                const numPacks = Math.ceil(neededAmount / selectedPackSize);
                const totalCost = numPacks * selectedPackPrice;
                return {
                    recommendedPacks: `${numPacks} x ${selectedPackSize}${unit}`,
                    cost: totalCost,
                    count: numPacks
                };
            };

            // Main calculation function
            function calculatePesticides() {
                resultsDiv.innerHTML = ''; // Clear previous results
                resultsDiv.style.display = 'none'; // Hide results by default
                resultsDiv.classList.remove('error'); // Remove error class if present

                const biga = parseFloat(bigaInput.value);

                if (isNaN(biga) || biga <= 0) {
                    resultsDiv.style.display = 'block';
                    resultsDiv.classList.add('error');
                    resultsDiv.innerHTML = '<p>Please enter a valid number for Biga.</p>';
                    return;
                }

                currentPesticideStates = {}; // Reset states for new calculation
                let resultsSections = []; // Array to store HTML sections for each pesticide

                // Imizathayper will always use the combined rate as per the prompt logic
                const imizathayperData = pesticidesData.imizathayper;
                const imizathayperRate = imizathayperData.ratePerBigaCombined;
                const imizathayperAmountNeeded = biga * imizathayperRate;
                
                // Default to largest pack for initial calculation
                let defaultImizathayperPack = imizathayperData.packs[0];
                let imizathayperRec = getCostForSelectedPack(imizathayperAmountNeeded, defaultImizathayperPack.size, defaultImizathayperPack.price, imizathayperData.unit);
                
                currentPesticideStates.imizathayper = {
                    amountNeeded: imizathayperAmountNeeded,
                    selectedPackSize: defaultImizathayperPack.size,
                    selectedPackPrice: defaultImizathayperPack.price,
                    isCancelled: false,
                    calculatedCost: imizathayperRec.cost,
                    calculatedPacksCount: imizathayperRec.count
                };

                let imizathayperSectionHTML = `<div class="pesticide-section" id="section-imizathayper">`;
                imizathayperSectionHTML += `<p><strong>Dawai Name: ${imizathayperData.name}</strong></p>`;
                imizathayperSectionHTML += `<p><strong>Total Dawai:</strong> ${imizathayperAmountNeeded} ${imizathayperData.unit}</p>`;
                imizathayperSectionHTML += `<p><strong>Use per Biga:</strong> ${imizathayperRate} ${imizathayperData.unit}</p>`;
                imizathayperSectionHTML += `<p><strong>Select Pack:</strong></p>`;
                imizathayperSectionHTML += generatePackOptionsHTML('imizathayper', imizathayperData.packs, imizathayperData.unit, defaultImizathayperPack.size);
                imizathayperSectionHTML += `<p><strong>Recommended Packs (Calculated):</strong> <span id="rec-packs-imizathayper">${imizathayperRec.recommendedPacks}</span></p>`;
                imizathayperSectionHTML += `<p><strong>Payment for ${imizathayperData.name}:</strong> ₹<span id="payment-imizathayper">${imizathayperRec.cost}</span></p>`;
                imizathayperSectionHTML += `<div class="action-buttons"><button class="cancel-btn" data-pesticide="imizathayper">Cancel</button><button class="undo-btn" data-pesticide="imizathayper">Undo</button></div>`;
                imizathayperSectionHTML += `</div>`;
                resultsSections.push(imizathayperSectionHTML);

                // --- IRIS Calculation ---
                const irisData = pesticidesData.iris;
                const irisAmountNeeded = biga * irisData.ratePerBiga;

                let defaultIrisPack = irisData.packs[0];
                let irisRec = getCostForSelectedPack(irisAmountNeeded, defaultIrisPack.size, defaultIrisPack.price, irisData.unit);

                currentPesticideStates.iris = {
                    amountNeeded: irisAmountNeeded,
                    selectedPackSize: defaultIrisPack.size,
                    selectedPackPrice: defaultIrisPack.price,
                    isCancelled: false,
                    calculatedCost: irisRec.cost,
                    calculatedPacksCount: irisRec.count
                };

                let irisSectionHTML = `<div class="pesticide-section" id="section-iris">`;
                irisSectionHTML += `<p><strong>Dawai Name: ${irisData.name}</strong></p>`;
                irisSectionHTML += `<p><strong>Total Dawai:</strong> ${irisAmountNeeded} ${irisData.unit}</p>`;
                irisSectionHTML += `<p><strong>Use per Biga:</strong> ${irisData.ratePerBiga} ${irisData.unit}</p>`;
                irisSectionHTML += `<p><strong>Select Pack:</strong></p>`;
                irisSectionHTML += generatePackOptionsHTML('iris', irisData.packs, irisData.unit, defaultIrisPack.size);
                irisSectionHTML += `<p><strong>Recommended Packs (Calculated):</strong> <span id="rec-packs-iris">${irisRec.recommendedPacks}</span></p>`;
                irisSectionHTML += `<p><strong>Payment for ${irisData.name}:</strong> ₹<span id="payment-iris">${irisRec.cost}</span></p>`;
                irisSectionHTML += `<div class="action-buttons"><button class="cancel-btn" data-pesticide="iris">Cancel</button><button class="undo-btn" data-pesticide="iris">Undo</button></div>`;
                irisSectionHTML += `</div>`;
                resultsSections.push(irisSectionHTML);

                // --- Centurion Calculation (Fixed with Imizathayper packs) ---
                const centurionData = pesticidesData.centurion;
                let centurionPacksCount = imizathayperRec.count; // Depends on how many Imizathayper packs are needed
                let centurionCost = centurionPacksCount * centurionData.pricePerPack;
                
                currentPesticideStates.centurion = {
                    amountNeeded: centurionData.fixedQuantityPerImizathayperPack * centurionPacksCount,
                    isCancelled: false,
                    calculatedCost: centurionCost,
                    calculatedPacksCount: centurionPacksCount
                };

                let centurionSectionHTML = `<div class="pesticide-section" id="section-centurion">`;
                centurionSectionHTML += `<p><strong>Dawai Name: ${centurionData.name}</strong></p>`;
                centurionSectionHTML += `<p><strong>Total Dawai:</strong> ${centurionData.fixedQuantityPerImizathayperPack} ${centurionData.unit} (per Imizathayper pack)</p>`;
                centurionSectionHTML += `<p><strong>Use per Biga:</strong> Fixed with Imizathayper 10% SL</p>`;
                centurionSectionHTML += `<p><strong>Recommended Package:</strong> ${centurionPacksCount} x ${centurionData.fixedQuantityPerImizathayperPack}${centurionData.unit} pack(s)</p>`;
                centurionSectionHTML += `<p><strong>Payment for ${centurionData.name}:</strong> ₹<span id="payment-centurion">${centurionCost}</span></p>`;
                centurionSectionHTML += `<div class="action-buttons"><button class="cancel-btn" data-pesticide="centurion">Cancel</button><button class="undo-btn" data-pesticide="centurion">Undo</button></div>`;
                centurionSectionHTML += `</div>`;
                resultsSections.push(centurionSectionHTML);

                // --- Clobin Calculation (Fixed with Imizathayper packs, always included) ---
                const clobinData = pesticidesData.clobin;
                let clobinPacksCount = imizathayperRec.count; // Depends on how many Imizathayper packs are needed
                let clobinCost = clobinPacksCount * clobinData.pricePerPack;
                
                currentPesticideStates.clobin = {
                    amountNeeded: clobinData.fixedPacksPerImizathayperPack * clobinPacksCount,
                    isCancelled: false,
                    calculatedCost: clobinCost,
                    calculatedPacksCount: clobinPacksCount
                };

                let clobinSectionHTML = `<div class="pesticide-section" id="section-clobin">`;
                clobinSectionHTML += `<p><strong>Dawai Name: ${clobinData.name}</strong></p>`;
                clobinSectionHTML += `<p><strong>Total Dawai:</strong> ${clobinData.fixedPacksPerImizathayperPack} ${clobinData.unit} (per Imizathayper pack)</p>`;
                clobinSectionHTML += `<p><strong>Use per Biga:</strong> Fixed with Imizathayper 10% SL (always included)</p>`;
                clobinSectionHTML += `<p><strong>Recommended Package:</strong> ${clobinPacksCount} x 1 ${clobinData.unit} pack(s)</p>`;
                clobinSectionHTML += `<p><strong>Payment for ${clobinData.name}:</strong> ₹<span id="payment-clobin">${clobinCost}</span></p>`;
                clobinSectionHTML += `<div class="action-buttons"><button class="cancel-btn" data-pesticide="clobin">Cancel</button><button class="undo-btn" data-pesticide="clobin">Undo</button></div>`;
                clobinSectionHTML += `</div>`;
                resultsSections.push(clobinSectionHTML);

                resultsDiv.innerHTML = resultsSections.join('');
                resultsDiv.innerHTML += `<div class="total-summary">`;
                resultsDiv.innerHTML += `<p><strong>Overall Total Payment for All Pesticides: ₹<span id="overall-total">0</span></strong></p>`;
                resultsDiv.innerHTML += `</div>`;
                resultsDiv.style.display = 'block';

                // Attach event listeners after content is rendered
                attachEventListeners();
                updateOverallTotalPayment(); // Initial overall total calculation
            }

            // Function to attach all event listeners (radio buttons, cancel/undo)
            function attachEventListeners() {
                document.querySelectorAll('.package-options input[type="radio"]').forEach(radio => {
                    radio.removeEventListener('change', handlePackChange); // Remove old listener to prevent duplicates
                    radio.addEventListener('change', handlePackChange);
                });
                document.querySelectorAll('.cancel-btn').forEach(btn => {
                    btn.removeEventListener('click', handleCancel);
                    btn.addEventListener('click', handleCancel);
                });
                document.querySelectorAll('.undo-btn').forEach(btn => {
                    btn.removeEventListener('click', handleUndo);
                    btn.addEventListener('click', handleUndo);
                });
            }

            // Handles changes in radio button selection for Imizathayper and IRIS
            function handlePackChange(event) {
                const changedRadio = event.target;
                const pesticideKey = changedRadio.closest('.package-options').dataset.pesticide;
                const selectedPackSize = parseFloat(changedRadio.value);
                const selectedPackPrice = parseFloat(changedRadio.dataset.price);

                if (!currentPesticideStates[pesticideKey].isCancelled) { // Only update if not cancelled
                    currentPesticideStates[pesticideKey].selectedPackSize = selectedPackSize;
                    currentPesticideStates[pesticideKey].selectedPackPrice = selectedPackPrice;
                    updatePesticideDisplay(pesticideKey);
                } else {
                    // If cancelled, reset the radio button to its previous state (or initial state)
                    const previousPackSize = currentPesticideStates[pesticideKey].selectedPackSize;
                    const originalRadio = document.querySelector(`input[name="pack-${pesticideKey}"][value="${previousPackSize}"]`);
                    if (originalRadio) {
                        originalRadio.checked = true;
                    }
                }
            }

            // Handles Cancel button click
            function handleCancel(event) {
                const pesticideKey = event.target.dataset.pesticide;
                const section = document.getElementById(`section-${pesticideKey}`);
                
                currentPesticideStates[pesticideKey].isCancelled = true;
                section.classList.add('cancelled');
                
                // Disable radio buttons visually
                const radios = section.querySelectorAll('input[type="radio"]');
                radios.forEach(radio => radio.disabled = true);

                updateOverallTotalPayment();
            }

            // Handles Undo button click
            function handleUndo(event) {
                const pesticideKey = event.target.dataset.pesticide;
                const section = document.getElementById(`section-${pesticideKey}`);

                currentPesticideStates[pesticideKey].isCancelled = false;
                section.classList.remove('cancelled');

                // Enable radio buttons
                const radios = section.querySelectorAll('input[type="radio"]');
                radios.forEach(radio => radio.disabled = false);

                updateOverallTotalPayment();
            }

            // Function to update the display for a specific pesticide and recalculate overall total
            function updatePesticideDisplay(pesticideKey) {
                const biga = parseFloat(bigaInput.value);
                const state = currentPesticideStates[pesticideKey];
                const data = pesticidesData[pesticideKey];

                let newCost = 0;
                let newPacksRecommended = "";
                let newPacksCount = 0;

                if (!state.isCancelled) {
                    if (pesticideKey === 'imizathayper' || pesticideKey === 'iris') {
                        const rec = getCostForSelectedPack(state.amountNeeded, state.selectedPackSize, state.selectedPackPrice, data.unit);
                        newCost = rec.cost;
                        newPacksRecommended = rec.recommendedPacks;
                        newPacksCount = rec.count;
                    } else if (pesticideKey === 'centurion' || pesticideKey === 'clobin') {
                        // These depend on Imizathayper's selected packs
                        const imizathayperState = currentPesticideStates.imizathayper;
                        if (imizathayperState && !imizathayperState.isCancelled) {
                             const imizathayperPackSize = imizathayperState.selectedPackSize;
                             const imizathayperAmountNeeded = imizathayperState.amountNeeded;
                             const imizathayperCurrentPacks = Math.ceil(imizathayperAmountNeeded / imizathayperPackSize);
                            
                            if (pesticideKey === 'centurion') {
                                newPacksCount = imizathayperCurrentPacks;
                                newCost = newPacksCount * data.pricePerPack;
                                newPacksRecommended = `${newPacksCount} x ${data.fixedQuantityPerImizathayperPack}${data.unit} pack(s)`;
                            } else if (pesticideKey === 'clobin') {
                                newPacksCount = imizathayperCurrentPacks;
                                newCost = newPacksCount * data.pricePerPack;
                                newPacksRecommended = `${newPacksCount} x 1 ${data.unit} pack(s)`;
                            }
                        }
                    }
                }

                // Update the state with new calculated values
                state.calculatedCost = newCost;
                state.calculatedPacksCount = newPacksCount;

                // Update the display for the specific pesticide
                const paymentSpan = document.getElementById(`payment-${pesticideKey}`);
                const recPacksSpan = document.getElementById(`rec-packs-${pesticideKey}`);

                if (paymentSpan) paymentSpan.textContent = newCost;
                if (recPacksSpan) recPacksSpan.textContent = newPacksRecommended;

                updateOverallTotalPayment();
            }

            // Function to update the overall total payment
            function updateOverallTotalPayment() {
                let currentTotal = 0;
                // Loop through all pesticides in our state
                for (const key in currentPesticideStates) {
                    if (currentPesticideStates.hasOwnProperty(key)) {
                        const state = currentPesticideStates[key];
                        if (!state.isCancelled) {
                            currentTotal += state.calculatedCost;
                        }
                    }
                }
                document.getElementById('overall-total').textContent = currentTotal;
            }
        });
    </script>
</body>
</html>
