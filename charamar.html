<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROAIN</title>
    <style>
        /* --- CSS Styling --- */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 600px; /* Slightly wider for more content */
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .input-group input[type="number"] {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background-color: #45a049;
        }

        .results {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9ffe9;
            border: 1px solid #d4ffd4;
            border-radius: 6px;
            text-align: left;
            display: none; /* Hidden by default */
        }

        .results .pesticide-section {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px dotted #ccc;
        }
        .results .pesticide-section:last-child {
            border-bottom: none; /* No border for the last section */
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .results p {
            margin: 8px 0;
            font-size: 17px;
            color: #333;
        }

        .results strong {
            color: #2e8b57;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-top: 15px;
        }
        .total-summary {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            color: #1a5a3a;
            border-top: 2px solid #4CAF50;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AGROAIN</h1>

        <div class="input-group">
            <label for="biga">Enter Biga:</label>
            <input type="number" id="biga" min="0" placeholder="e.g., 1, 2.5">
        </div>
        
        <button id="submitBtn">Submit</button>

        <div id="results" class="results">
            </div>
    </div>

    <script>
        /* --- JavaScript Logic --- */
        document.addEventListener('DOMContentLoaded', () => {
            const bigaInput = document.getElementById('biga');
            const submitBtn = document.getElementById('submitBtn');
            const resultsDiv = document.getElementById('results');

            // Define pesticide data including rates and prices
            const pesticides = {
                imizathayper: {
                    name: "Imizathayper 10% SL",
                    ratePerBiga: 200, // ml per biga
                    unit: "ml",
                    packs: [
                        { size: 1000, price: 900 }, // 1 Liter
                        { size: 500, price: 450 }
                    ]
                },
                iris: {
                    name: "IRIS",
                    ratePerBiga: 90, // ml per biga
                    unit: "ml",
                    packs: [
                        { size: 800, price: 1450 },
                        { size: 400, price: 750 }
                    ]
                },
                centurion: {
                    name: "Centurion",
                    fixedQuantity: 400, // ml
                    unit: "ml",
                    price: 650, // per 400ml pack
                    dependency: "imizathayper" // This goes with Imizathayper
                },
                clobin: {
                    name: "Clobin",
                    fixedPacks: 1, // 1 pack
                    unit: "pack",
                    price: 140, // per pack
                    dependency: "imizathayper", // This goes with Imizathayper
                    minBigaForFixed: 0 // Always provide if Imizathayper is needed, even for less than 4 biga
                }
            };

            submitBtn.addEventListener('click', calculatePesticides);

            /**
             * Calculates the recommended package combination and total cost
             * to meet the needed amount, prioritizing larger packs.
             * @param {number} neededAmount The total amount of pesticide required (ml/gm).
             * @param {Array<Object>} packOptions An array of available pack sizes and their prices.
             * @param {string} unit The unit of measurement (ml, gm, pack).
             * @returns {Object} An object containing the recommended string and total cost.
             */
            const getRecommendedPacksAndCost = (neededAmount, packOptions, unit) => {
                let purchasedPacks = {};
                let currentAmountToCover = neededAmount;
                let currentCost = 0;
                
                if (neededAmount === 0) {
                     return { recommended: "0 packs needed.", cost: 0, count: 0 };
                }

                // Sort packs from largest to smallest to prioritize larger packs
                packOptions.sort((a, b) => b.size - a.size);

                for (const pack of packOptions) {
                    if (currentAmountToCover >= pack.size) {
                        const numPacks = Math.floor(currentAmountToCover / pack.size);
                        purchasedPacks[pack.size] = (purchasedPacks[pack.size] || 0) + numPacks;
                        currentAmountToCover -= numPacks * pack.size;
                        currentCost += numPacks * pack.price;
                    }
                }

                // For any remaining amount or if neededAmount is less than smallest pack
                if (currentAmountToCover > 0 && packOptions.length > 0) {
                    const smallestPack = packOptions[packOptions.length - 1];
                    if (smallestPack && smallestPack.size > 0) {
                        const numSmallestPacks = Math.ceil(currentAmountToCover / smallestPack.size);
                        purchasedPacks[smallestPack.size] = (purchasedPacks[smallestPack.size] || 0) + numSmallestPacks;
                        currentCost += numSmallestPacks * smallestPack.price;
                    }
                } else if (neededAmount > 0 && Object.keys(purchasedPacks).length === 0 && packOptions.length > 0) {
                    // Scenario where neededAmount is less than the smallest pack, so recommend one smallest pack.
                    const smallestPack = packOptions[packOptions.length - 1];
                     if (smallestPack && smallestPack.size > 0) {
                        purchasedPacks[smallestPack.size] = 1;
                        currentCost = smallestPack.price;
                     }
                }

                let recommendationStrings = [];
                let totalPackCount = 0;
                for (const size of Object.keys(purchasedPacks).sort((a, b) => b - a)) { // Sort descending for display
                    recommendationStrings.push(`${purchasedPacks[size]} x ${size}${unit}`);
                    totalPackCount += purchasedPacks[size];
                }
                
                return {
                    recommended: recommendationStrings.join(', '),
                    cost: currentCost,
                    count: totalPackCount // Number of packs recommended
                };
            };


            function calculatePesticides() {
                resultsDiv.innerHTML = ''; // Clear previous results
                resultsDiv.style.display = 'none'; // Hide results by default
                resultsDiv.classList.remove('error'); // Remove error class if present

                const biga = parseFloat(bigaInput.value);

                if (isNaN(biga) || biga <= 0) {
                    resultsDiv.style.display = 'block';
                    resultsDiv.classList.add('error');
                    resultsDiv.innerHTML = '<p>Please enter a valid number for Biga.</p>';
                    return;
                }

                let resultsHTML = '';
                let overallTotalPayment = 0;

                // --- Imizathayper Calculation ---
                const imizathayperData = pesticides.imizathayper;
                const imizathayperAmountNeeded = biga * imizathayperData.ratePerBiga;
                const imizathayperRec = getRecommendedPacksAndCost(imizathayperAmountNeeded, imizathayperData.packs, imizathayperData.unit);
                overallTotalPayment += imizathayperRec.cost;

                resultsHTML += `<div class="pesticide-section">`;
                resultsHTML += `<p><strong>Dawai Name: ${imizathayperData.name}</strong></p>`;
                resultsHTML += `<p><strong>Total Dawai:</strong> ${imizathayperAmountNeeded} ${imizathayperData.unit}</p>`;
                resultsHTML += `<p><strong>Use per Biga:</strong> ${imizathayperData.ratePerBiga} ${imizathayperData.unit}</p>`;
                resultsHTML += `<p><strong>Recommended Package:</strong> ${imizathayperRec.recommended}</p>`;
                resultsHTML += `<p><strong>Payment for ${imizathayperData.name}:</strong> ₹${imizathayperRec.cost}</p>`;
                resultsHTML += `</div>`;

                // --- IRIS Calculation ---
                const irisData = pesticides.iris;
                const irisAmountNeeded = biga * irisData.ratePerBiga;
                const irisRec = getRecommendedPacksAndCost(irisAmountNeeded, irisData.packs, irisData.unit);
                overallTotalPayment += irisRec.cost;

                resultsHTML += `<div class="pesticide-section">`;
                resultsHTML += `<p><strong>Dawai Name: ${irisData.name}</strong></p>`;
                resultsHTML += `<p><strong>Total Dawai:</strong> ${irisAmountNeeded} ${irisData.unit}</p>`;
                resultsHTML += `<p><strong>Use per Biga:</strong> ${irisData.ratePerBiga} ${irisData.unit}</p>`;
                resultsHTML += `<p><strong>Recommended Package:</strong> ${irisRec.recommended}</p>`;
                resultsHTML += `<p><strong>Payment for ${irisData.name}:</strong> ₹${irisRec.cost}</p>`;
                resultsHTML += `</div>`;

                // --- Centurion Calculation (Fixed with Imizathayper) ---
                const centurionData = pesticides.centurion;
                // Centurion is fixed to Imizathayper, so it's always included if Imizathayper is bought.
                // Assuming "1 liter imazethapyr 10%sl ke sath fix jaye gi" means one 400ml pack of Centurion.
                let centurionPacks = imizathayperRec.count > 0 ? 1 : 0; // If any Imizathayper is recommended, add Centurion
                let centurionCost = centurionPacks * centurionData.price;
                overallTotalPayment += centurionCost;

                resultsHTML += `<div class="pesticide-section">`;
                resultsHTML += `<p><strong>Dawai Name: ${centurionData.name}</strong></p>`;
                resultsHTML += `<p><strong>Total Dawai:</strong> ${centurionData.fixedQuantity} ${centurionData.unit}</p>`;
                resultsHTML += `<p><strong>Use per Biga:</strong> Fixed with Imizathayper 10% SL</p>`;
                resultsHTML += `<p><strong>Recommended Package:</strong> ${centurionPacks} x ${centurionData.fixedQuantity}${centurionData.unit} pack(s)</p>`;
                resultsHTML += `<p><strong>Payment for ${centurionData.name}:</strong> ₹${centurionCost}</p>`;
                resultsHTML += `</div>`;

                // --- Clobin Calculation (Fixed with Imizathayper, even for <4 biga) ---
                const clobinData = pesticides.clobin;
                // Clobin is fixed with Imizathayper, always provided if Imizathayper is needed.
                let clobinPacks = imizathayperRec.count > 0 ? clobinData.fixedPacks : 0;
                let clobinCost = clobinPacks * clobinData.price;
                overallTotalPayment += clobinCost;

                resultsHTML += `<div class="pesticide-section">`;
                resultsHTML += `<p><strong>Dawai Name: ${clobinData.name}</strong></p>`;
                resultsHTML += `<p><strong>Total Dawai:</strong> ${clobinData.fixedPacks} ${clobinData.unit}</p>`;
                resultsHTML += `<p><strong>Use per Biga:</strong> Fixed with Imizathayper 10% SL (always included)</p>`;
                resultsHTML += `<p><strong>Recommended Package:</strong> ${clobinPacks} x 1 ${clobinData.unit} pack(s)</p>`;
                resultsHTML += `<p><strong>Payment for ${clobinData.name}:</strong> ₹${clobinCost}</p>`;
                resultsHTML += `</div>`;

                resultsHTML += `<div class="total-summary">`;
                resultsHTML += `<p><strong>Overall Total Payment for All Pesticides: ₹${overallTotalPayment}</strong></p>`;
                resultsHTML += `</div>`;

                resultsDiv.innerHTML = resultsHTML;
                resultsDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
