<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khet Dawai Calculator</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1b5e20; text-align: center; font-size: 22px; }
        .input-area { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input[type="number"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .checkbox-row { background: #f1f8e9; padding: 12px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; margin-bottom: 15px; border: 1px solid #c8e6c9; }
        .checkbox-row input { margin-right: 12px; width: 18px; height: 18px; }
        button { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1b5e20; }
        #bill { margin-top: 20px; display: none; padding: 15px; border-top: 2px solid #eee; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .total { font-size: 20px; font-weight: bold; color: #c62828; text-align: center; margin-top: 15px; border-top: 2px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Khet Dawai Calculator</h2>
    
    <div class="input-area">
        <label>Aapko kitne Biga ki dawai dalni hai? (1-50)</label>
        <input type="number" id="biga" min="1" max="50" placeholder="Biga sankhya dalein">
    </div>

    <label class="checkbox-row">
        <input type="checkbox" id="gajargas"> 
        <span>Khet mein <b>Gajargas</b> hai?</span>
    </label>

    <button onclick="calculate()">Submit Karein</button>

    <div id="bill">
        <div id="items"></div>
        <div class="total" id="grandTotal"></div>
    </div>
</div>

<script>
function calculate() {
    let biga = parseInt(document.getElementById('biga').value);
    let hasGajargas = document.getElementById('gajargas').checked;

    if (isNaN(biga) || biga < 1 || biga > 50) {
        alert("Kripya 1 se 50 ke beech ki sankhya likhein.");
        return;
    }

    // --- 2,4-D Logic (200gm per biga) ---
    let totalGm = biga * 200;
    let pack1L = 0, pack500 = 0, pack250 = 0;

    // Packing calculation (Optimized for cost/quantity)
    let tempGm = totalGm;
    pack1L = Math.floor(tempGm / 1000);
    tempGm %= 1000;

    if (tempGm > 500) {
        pack1L++; // 1L is cheaper/better than multiple small packs
    } else if (tempGm > 250) {
        pack500 = 1;
    } else if (tempGm > 0) {
        pack250 = 1;
    }

    let d24Cost = (pack1L * 350) + (pack500 * 200) + (pack250 * 130);
    let totalPacks24D = pack1L + pack500 + pack250;

    // --- Topa Tap Logic (1 pack per 2 biga) ---
    let topaPacks = Math.ceil(biga / 2);
    let topaCost = topaPacks * 220;

    // --- Met Sulfuron Logic (Based on 2,4-D pack count) ---
    let metCost = 0;
    let metPacks = 0;
    if (hasGajargas) {
        metPacks = totalPacks24D; // Jitan 2,4-D pack, utne Met pack
        metCost = metPacks * 50;
    }

    // --- Result Display ---
    let itemsHtml = `<b>Parchaa:</b><br><br>`;
    itemsHtml += `<div class="row"><span>2,4-D (${pack1L}L, ${pack500}x500ml, ${pack250}x250ml)</span> <span>₹${d24Cost}</span></div>`;
    itemsHtml += `<div class="row"><span>Topa Tap (${topaPacks} Pack)</span> <span>₹${topaCost}</span></div>`;
    
    if (hasGajargas) {
        itemsHtml += `<div class="row"><span>Met Sulfuron (${metPacks} Pack)</span> <span>₹${metCost}</span></div>`;
    }

    document.getElementById('items').innerHTML = itemsHtml;
    document.getElementById('grandTotal').innerText = "Total: ₹" + (d24Cost + topaCost + metCost);
    document.getElementById('bill').style.display = "block";
}
</script>

</body>
</html>
