<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agroain - बीज उपचार सलाहकार</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4CAF50; --dark: #2e7d32; --bg: #f4f7f4; }
        body { font-family: Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        
        .header { background: var(--dark); color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; position: relative; }
        .back-btn { position: absolute; left: 15px; top: 18px; color: white; text-decoration: none; font-size: 1.1rem; }
        
        .search-box-container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; position: relative; } /* पोजीशन रिलेटिव ताकि सजेशन सही जगह दिखे */
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .weight-group { display: flex; gap: 8px; }
        .weight-group input { flex: 2; }
        .weight-group select { flex: 1; }

        /* सर्च बार और बटन का कॉम्बिनेशन */
        .search-bar-wrapper { display: flex; gap: 8px; }
        .search-btn { background: var(--dark); color: white; border: none; padding: 0 20px; border-radius: 6px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .search-btn:hover { background: #1b5e20; }

        /* मुख्य index.html जैसी लाइव सजेशन लिस्ट की स्टाइल */
        .suggestions-list { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: white; 
            border: 1px solid #ddd; 
            border-top: none; 
            border-radius: 0 0 8px 8px; 
            max-height: 200px; 
            overflow-y: auto; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            z-index: 1000; 
            display: none; 
            box-sizing: border-box;
        }
        .suggestion-item { 
            padding: 12px; 
            cursor: pointer; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }
        .suggestion-item:hover { background: #f5f5f5; color: var(--dark); font-weight: bold; }
        .suggestion-item .tech-span { color: #777; font-size: 0.85rem; font-style: italic; }

        /* पुराना सुंदर कार्ड डिज़ाइन */
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; border: 1px solid #e0e0e0; }
        .card-img { width: 100%; height: 180px; object-fit: contain; background: #fff; padding: 10px; box-sizing: border-box; border-bottom: 1px solid #eee; }
        .card-body { padding: 15px; }
        .card-title { font-size: 1.3rem; font-weight: bold; color: #1b5e20; margin: 0 0 5px 0; }
        .card-tech { font-size: 0.9rem; color: #666; margin: 4px 0; font-style: italic; }
        .card-company { font-size: 0.9rem; color: #555; margin: 4px 0; }
        
        .dose-box { background: #fff3e0; border-left: 4px solid #ff9800; padding: 10px; border-radius: 4px; margin: 12px 0; }
        .dose-title { font-size: 0.95rem; color: #e65100; font-weight: bold; margin: 0 0 3px 0; }
        .dose-value { font-size: 1.2rem; font-weight: bold; color: #bf360c; }
        
        .price-tag { font-size: 1.2rem; font-weight: bold; color: var(--dark); margin: 10px 0; }
        
        .buy-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .buy-btn:hover { background: var(--dark); }
        
        .no-data { text-align: center; padding: 30px; color: #777; font-size: 1.1rem; background: white; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h2 style="margin:0;">🧪 बीज उपचार सलाहकार</h2>
    </div>

    <div class="search-box-container">
        <!-- 1. फसल चुनें -->
        <div class="form-group">
            <label><i class="fa-solid fa-wheat-awn"></i> अपनी फसल चुनें:</label>
            <select id="cropSelect" class="form-control">
                <option value="soyabean">सोयाबीन (Soyabean)</option>
                <option value="garlic">लहसुन (Garlic)</option>
                <option value="wheat">गेहूं (Wheat)</option>
                <option value="onion">प्याज (Onion)</option>
                <option value="potato">आलू (Potato)</option>
                <option value="gram">चना (Gram)</option>
                <option value="mustard">सरसों (Mustard)</option>
                <option value="maize">मक्का (Maize)</option>
                <option value="cotton">कपास (Cotton)</option>
                <option value="paddy">धान (Paddy)</option>
                <option value="chilli">मिर्च (Chilli)</option>
                <option value="tomato">टमाटर (Tomato)</option>
                <option value="cucumber">खीरा (Cucumber)</option>
                <option value="pea">मटर (Pea)</option>
                <option value="moong">मूंग (Moong)</option>
                <option value="urad">उड़द (Urad)</option>
                <option value="groundnut">मूंगफली (Groundnut)</option>
                <option value="turmeric">हल्दी (Turmeric)</option>
                <option value="ginger">अदरक (Ginger)</option>
                <option value="coriander">धनिया (Coriander)</option>
                <option value="fenugreek">मेथी (Fenugreek)</option>
                <option value="fennel">सौंफ (Fennel)</option>
                <option value="cumin">जीरा (Cumin)</option>
                <option value="pomegranate">अनार (Pomegranate)</option>
                <option value="watermelon">तरबूज (Watermelon)</option>
            </select>
        </div>

        <!-- 2. बीज का वजन -->
        <div class="form-group">
            <label><i class="fa-solid fa-weight-hanging"></i> बीज का कुल वजन:</label>
            <div class="weight-group">
                <input type="number" id="seedWeight" class="form-control" value="2" min="1">
                <select id="weightUnit" class="form-control">
                    <option value="quintal">क्विंटल (Quintal)</option>
                    <option value="kg">किग्रा (Kg)</option>
                </select>
            </div>
        </div>

        <!-- 3. सर्च बार, बटन और लाइव सजेशन बॉक्स -->
        <div class="form-group">
            <label><i class="fa-solid fa-magnifying-glass"></i> विशिष्ट दवाई या टेक्निकल खोजें:</label>
            <div class="search-bar-wrapper">
                <input type="text" id="searchBar" class="form-control" placeholder="उदा. Xelora, झैलोरा, Carboxin..." autocomplete="off">
                <button type="button" id="searchButton" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i> खोजें
                </button>
            </div>
            <!-- मुख्य index.html जैसा सजेशन बॉक्स नोड -->
            <div id="suggestionsBox" class="suggestions-list"></div>
        </div>
    </div>

    <!-- रिजल्ट एरिया -->
    <div id="loading" style="text-align: center; font-size: 1.1rem; color: var(--dark); padding: 20px;">
        <i class="fa-solid fa-spinner fa-pulse"></i> डेटाबेस से दवाइयाँ लोड हो रही हैं...
    </div>
    
    <div id="resultsContainer"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="seed_treatment.js"></script>
</body>
</html>
